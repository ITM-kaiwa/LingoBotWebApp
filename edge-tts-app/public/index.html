    // Multi-Language Target & UI Aware Expression & Grammar Advice Generator (Non-repetitive)
    function generateExpressionAdvice(text, targetLang, uiLang) {
      const trimmed = text ? text.trim() : '';
      const lower = trimmed.toLowerCase();

      const isUiVi = (uiLang || 'ja').startsWith('vi');

        // Scenario / Setting setup message (e.g. "空港での会話にしましょう", "レストラン")
        if (trimmed.includes('会話にしましょう') || trimmed.includes('シチュエーション') || trimmed.includes('設定') || trimmed.includes('テーマ')) {
          return {
            category: isUiVi ? "Thiết lập tình huống / 場面設定の提示" : "会話場面・役割設定の提示",
            betterList: [
              "「今日は空港カウンターのシチュエーションで練習させてください。」",
              "「空港でのチェックインのやり取りでお願いします。」"
            ],
            explanation: isUiVi ? "Khi bắt đầu một kịch bản luyện tập, hãy nêu rõ tình huống để AI nhập vai chính xác."

            usage: isUiVi ? "Mẫu câu: [Tình huống] + でお願いします."
                           : "【設定のコツ】「〜の場面で」「〜役でお願いします」と具体的に伝えると効果的です。",
            example: "今日は空港の荷物預け入れの場面で会話練習をお願いします。",
            exampleTrans: isUiVi ? "Hôm nay xin hãy cùng luyện tập ở kịch bản gửi hành lý ở sân bay." : "（自然なシチュエーション提示の例文）"

    // Pronunciation Levenshtein Evaluator
    function evaluatePronunciation(targetText, recognizedText) {
      const norm = str => str.toLowerCase().replace(/[.,/#!$%^&*;:{}=\-_`~()?'"“”]/g, '').replace(/\s+/g, ' ').trim();
      const tWords = norm(targetText).split(' ').filter(Boolean);
      const rWords = norm(recognizedText).split(' ').filter(Boolean);
      if (tWords.length === 0) return { score: 100, diff: [] };

      const n = tWords.length, m = rWords.length;
      const dp = Array.from({ length: n + 1 }, () => Array(m + 1).fill(0));
      for (let i = 0; i <= n; i++) dp[i][0] = i;
      for (let j = 0; j <= m; j++) dp[0][j] = j;

      for (let i = 1; i <= n; i++) {
        for (let j = 1; j <= m; j++) {
          if (tWords[i - 1] === rWords[j - 1]) dp[i][j] = dp[i - 1][j - 1];
          else dp[i][j] = Math.min(dp[i - 1][j] + 1, dp[i][j - 1] + 1, dp[i - 1][j - 1] + 1);
        }
      }

      let i = n, j = m, diff = [], correctCount = 0;
      while (i > 0 || j > 0) {
        if (i > 0 && j > 0 && tWords[i - 1] === rWords[j - 1]) {
          diff.unshift({ type: 'correct', word: tWords[i - 1] });
          correctCount++; i--; j--;
        } else if (i > 0 && j > 0 && dp[i][j] === dp[i - 1][j - 1] + 1) {
          diff.unshift({ type: 'missing', word: tWords[i - 1], said: rWords[j - 1] });
          i--; j--;
        } else if (i > 0 && dp[i][j] === dp[i - 1][j] + 1) {
          diff.unshift({ type: 'missing', word: tWords[i - 1] });
          i--;
        } else {
          diff.unshift({ type: 'extra', word: rWords[j - 1] });
          j--;
        }
      }

      const score = Math.max(0, Math.round((correctCount / tWords.length) * 100));
      let grade = 'Cần luyện tập / Needs Practice', gradeColor = '#e63946';
      if (score >= 90) { grade = 'Xuất sắc / Excellent'; gradeColor = '#2a9d8f'; }
      else if (score >= 75) { grade = 'Rất tốt / Very Good'; gradeColor = '#e07a5f'; }
      else if (score >= 50) { grade = 'Khá tốt / Good Attempt'; gradeColor = '#f4a261'; }

      return { score, grade, gradeColor, diff };
    }

    // Helper component to render Kanji with Furigana Ruby tags: 漢字（かんじ） -> <ruby>漢字<rt>かんじ</rt></ruby>
    function FuriganaText({ text }) {
      if (!text) return null;
      // Match pattern: Kanji words followed by furigana in parentheses, e.g., 漢字（かんじ） or 空港(くうこう)
      const parts = text.split(/([\u4E00-\u9FFF\u3005]+\s*[\（\(][\u3040-\u309F\u30A0-\u30FFa-zA-Z\s]+[\）\)])/g);

      return (
        <span>
          {parts.map((part, index) => {
            const match = part.match(/^([\u4E00-\u9FFF\u3005]+)\s*[\（\(]([\u3040-\u309F\u30A0-\u30FFa-zA-Z\s]+)[\）\)]$/);
            if (match) {
              return (
                <ruby key={index} style={{ rubyPosition: 'over' }}>
                  {match[1]}
                  <rt style={{ fontSize: '0.68em', color: 'var(--accent-terracotta-dark)', fontWeight: '600' }}>{match[2]}</rt>
                </ruby>
              );
            }
            return <span key={index}>{part}</span>;
          })}
        </span>
      );
    }

            activeAudioRef.current = null;
          }
          setPlayingId(null);
          return;
        }

        // Stop any currently playing audio before starting new audio
        if (window.speechSynthesis && window.speechSynthesis.speaking) {
          window.speechSynthesis.cancel();
        }
        if (activeAudioRef.current) {
          activeAudioRef.current.pause();
          activeAudioRef.current.currentTime = 0;
          activeAudioRef.current = null;
        }
        setPlayingId(null);

        const cleanAudioText = stripFurigana(text);

        // --- MODE A: STANDARD WEB SPEECH API (TTS=Gen) ---
        if (ttsEngine === 'gen') {
          if (!('speechSynthesis' in window)) {
            alert('ご使用のブラウザは標準Web Speech APIに対応していません。');
            return;
          }
          const langCode = language || targetLang || 'ja-JP';
          const utterance = new SpeechSynthesisUtterance(cleanAudioText);
          utterance.lang = langCode;

          // Select matching native voice if available
          const voices = window.speechSynthesis.getVoices();
          const langPrefix = langCode.split('-')[0];
          const targetVoice = voices.find(v => v.lang.replace('_', '-').startsWith(langPrefix));
          if (targetVoice) utterance.voice = targetVoice;

          setPlayingId(id);
          utterance.onend = () => setPlayingId(null);
          utterance.onerror = () => setPlayingId(null);

          window.speechSynthesis.speak(utterance);
          return;
        }

        // --- MODE B: EDGE-TTS HIGH QUALITY VOICE API (TTS=Edge) ---
        let blobUrl = audioBlobCache.current[id];
        if (!blobUrl) {
          setLoadingId(id);
          try {
            const res = await fetch(`${BACKEND_URL}/api/tts`, {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({ text: cleanAudioText, language })
            });
            if (!res.ok) throw new Error(`HTTP ${res.status}`);
            const blob = await res.blob();
            blobUrl = URL.createObjectURL(blob);
            audioBlobCache.current[id] = blobUrl;
            setLoadingId(null);
          } catch (err) {
            setLoadingId(null);
            console.warn(`[Edge-TTS API Failed -> Web Speech API Fallback]: ${err.message}`);

            // Automatically update UI header button state to 'gen' when falling back
            setTtsEngine('gen');

            // Automatic fallback to browser native Web Speech API if Edge-TTS server endpoint fails (e.g. HTTP 500)
            if ('speechSynthesis' in window) {
              const langCode = language || targetLang || 'ja-JP';
              const utterance = new SpeechSynthesisUtterance(cleanAudioText);
              utterance.lang = langCode;

              const voices = window.speechSynthesis.getVoices();
              const langPrefix = langCode.split('-')[0];
              const targetVoice = voices.find(v => v.lang.replace('_', '-').startsWith(langPrefix));
              if (targetVoice) utterance.voice = targetVoice;

              setPlayingId(id);
              utterance.onend = () => setPlayingId(null);
              utterance.onerror = () => setPlayingId(null);

              window.speechSynthesis.speak(utterance);
              return;
            }

            alert(`Lỗi phát âm thanh: ${err.message}`);
            return;
          }
        }

        const audio = new Audio(blobUrl);
        activeAudioRef.current = audio;
        setPlayingId(id);

        audio.onended = () => { setPlayingId(null); activeAudioRef.current = null; };
        audio.onerror = () => { setPlayingId(null); activeAudioRef.current = null; };

        audio.play().catch(e => { setPlayingId(null); activeAudioRef.current = null; });
      };

      // Download MP3
      const downloadMp3 = async (id, text, language, filename = 'lingobot_voice.mp3') => {
        let blobUrl = audioBlobCache.current[id];
        if (!blobUrl) {
          setLoadingId(id);
          try {
            const res = await fetch('/api/tts', {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({ text, language })
            });
            if (!res.ok) throw new Error(`HTTP ${res.status}`);
            const blob = await res.blob();
            blobUrl = URL.createObjectURL(blob);
            audioBlobCache.current[id] = blobUrl;
            setLoadingId(null);
          } catch (err) {
            setLoadingId(null);
            alert(`Lỗi tải xuống: ${err.message}`);
            return;
          }
        }

        const a = document.createElement('a');
        a.href = blobUrl;
        a.download = filename;
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
      };

      // Handle Step 0 Choice: Gemini API Key (Mandatory - No Skip)
      const handleSubmitApiKey = (inputKey) => {
        const cleanKey = inputKey ? inputKey.trim() : '';
        const isInvalid = !cleanKey || cleanKey.toLowerCase() === 'skip';

        if (isInvalid) {
          const warnMsg = {
            id: 'warn-key-' + Date.now(),
            sender: 'ai',
            isError: true,
            lang: 'bilingual',
            text: `⚠️ Vui lòng nhập Google Gemini API Key để tiếp tục. (API Key là bắt buộc, không thể bỏ qua)\n⚠️ 継続するには Google Gemini APIキーを入力してください。（※APIキーの入力は必須です。スキップはできません）`,
            time: new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' })
          };
          setChatMessages(prev => [...prev, warnMsg]);
          scrollToBottom();
          focusTextInput();
          return;
        }

        setGeminiApiKey(cleanKey);
        setOnboardingStep('ui_lang');

        const userMsg = {
          id: 'user-key-' + Date.now(),
          sender: 'user',
          text: `🔑 [API Key]: ${cleanKey.slice(0, 6)}...`,
          time: new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' })
        };

        const aiStep1 = {
          id: 'step1-prompt-' + Date.now(),
          sender: 'ai',
          lang: 'trilingual',
          type: 'onboarding_ui',
          text: `🇻🇳 Chào bạn! Vui lòng chọn ngôn ngữ giao diện bạn muốn sử dụng:\n🇯🇵 次（つぎ）に、アプリの案内（あんない）で使用（しよう）する【使用言語（しようげんご）】を選択（せんたく）してください：\n🇺🇸 Next, please select the language for the app interface:`,
          time: new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' })
        };

        setChatMessages(prev => [...prev, userMsg, aiStep1]);
        scrollToBottom();
        focusTextInput();
      };

      // Handle Step 1 Choice: UI Language
      const handleSelectUiLang = (selectedCode) => {
        setUiLang(selectedCode);
        setOnboardingStep('target_lang');

        const step2MsgMap = {
          'ja-JP': '使用言語（しようげんご）を【日本語（にほんご）】に設定（せってい）しました。次（つぎ）に、会話練習（かいわれんしゅう）で学習（がくしゅう）したい【目標言語（もくひょうげんご）】を選択（せんたく）してください：',
          'vi-VN': 'Đã chọn ngôn ngữ giao diện là [Tiếng Việt]. Tiếp theo, vui lòng chọn [Ngôn ngữ mục tiêu] mà bạn muốn luyện tập:',
          'en-US': 'Interface language set to [English]. Next, please select your [Target Learning Language] to practice:'
        };

        const userMsg = {
          id: 'user-select-ui-' + Date.now(),
          sender: 'user',
          text: `[使用言語 / UI Language]: ${LANG_META[selectedCode].flag} ${LANG_META[selectedCode].name}`,
          time: new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' })
        };

        const aiStep2 = {
          id: 'step2-prompt-' + Date.now(),
          sender: 'ai',
          lang: selectedCode,
          type: 'onboarding_target',
          text: step2MsgMap[selectedCode] || step2MsgMap['ja-JP'],
          time: new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' })
        };

        setChatMessages(prev => [...prev, userMsg, aiStep2]);
      };

      // Handle Step 2 Choice: Target Learning Language
      const handleSelectTargetLang = (selectedCode) => {
        setTargetLang(selectedCode);
        setOnboardingStep('complete');

        const step3WelcomeMap = {
          'en-US': "Wonderful! Target language set to English. Let's practice speaking together! How are you doing today?",
          'ja-JP': "素晴（すば）らしいですね！目標言語（もくひょうげんご）を【日本語（にほんご）】に設定（せってい）しました。さあ、一緒（いっしょ）に会話練習（かいわれんしゅう）を始（はじ）めましょう！",
          'vi-VN': "Tuyệt vời! Ngôn ngữ mục tiêu là [Tiếng Việt]. Hãy bắt đầu luyện tập giao tiếp ngay hôm nay nhé!"
        };

        const userMsg = {
          id: 'user-select-target-' + Date.now(),
          sender: 'user',
          text: `[目標言語 / Target Language]: ${LANG_META[selectedCode].flag} ${LANG_META[selectedCode].name}`,
          time: new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' })
        };

        const aiStep3 = {
          id: 'step3-start-' + Date.now(),
          sender: 'ai',
          lang: selectedCode,
          text: step3WelcomeMap[selectedCode] || step3WelcomeMap['en-US'],
          time: new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' })
        };

        setChatMessages(prev => [...prev, userMsg, aiStep3]);

        // Play welcome in target language
        setTimeout(() => {
          playEdgeTts(aiStep3.id, aiStep3.text, selectedCode);
        }, 300);
      };

      // Reset Chat History
      const handleResetChat = () => {
        const resetMap = {
          'en-US': "Conversation reset! What topic or situation would you like to practice now? (e.g. daily conversation, ordering food, or travel)",
          'ja-JP': "会話をリセットしました！新しいトピックで会話を始めましょう。どんな場面を練習しますか？（例：日常会話、レストランでの注文、旅行など）",
          'vi-VN': "Đã làm mới cuộc trò chuyện! Bạn muốn luyện tập chủ đề nào tiếp theo?"
        };

        const resetMsg = {
          id: 'ai-reset-' + Date.now(),
          sender: 'ai',
          lang: targetLang,
          text: resetMap[targetLang] || resetMap['en-US'],
          time: new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' })
        };

        setChatMessages([resetMsg]);
        scrollToBottom();
        focusTextInput();
      };

      // Active Connected Gemini Model State
      const [activeConnectedModel, setActiveConnectedModel] = useState('');
      const [isThinking, setIsThinking] = useState(false);

      // Send Chat Message to Gemini API / Backend Chat Tutor
      const handleUserChat = async (userText) => {
        if (!userText.trim()) return;

        if (onboardingStep === 'api_key') {
          handleSubmitApiKey(userText);
          return;
        }

        const cleanInput = userText.trim();
        const lowerInput = cleanInput.toLowerCase();

        // --- SECRET COMMAND: Dynamic TTS Engine Switch ---
        if (lowerInput === 'tts=gen' || lowerInput === 'tts = gen') {
          setTtsEngine('gen');
          const userCmdMsg = {
            id: 'cmd-user-' + Date.now(),
            sender: 'user',
            text: userText,
            time: new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' })
          };
          const sysMsg = {
            id: 'sys-tts-' + Date.now(),
            sender: 'ai',
            lang: 'bilingual',
            text: `🔊 TTSを切り替え（きりかえ）ました：TTS-Gen`,
            time: new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' })
          };
          setChatMessages(prev => [...prev, userCmdMsg, sysMsg]);
          scrollToBottom();
          focusTextInput();
          return;
        }

        if (lowerInput === 'tts=edge' || lowerInput === 'tts = edge') {
          setTtsEngine('edge');
          const userCmdMsg = {
            id: 'cmd-user-' + Date.now(),
            sender: 'user',
            text: userText,
            time: new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' })
          };
          const sysMsg = {
            id: 'sys-tts-' + Date.now(),
            sender: 'ai',
            lang: 'bilingual',
            text: `🔊 TTSを切り替え（きりかえ）ました：TTS-Edge`,
            time: new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' })
          };
          setChatMessages(prev => [...prev, userCmdMsg, sysMsg]);
          scrollToBottom();
          focusTextInput();
          return;
        }

        const userMsg = {
          id: 'user-' + Date.now(),
          sender: 'user',
          text: userText,
          time: new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' })
        };

        setChatMessages(prev => [...prev, userMsg]);
        setIsThinking(true);
        scrollToBottom();

        let replyText = '';
        let connectedModel = '';
        let directErrorLog = '';

        // 1. Direct Browser-to-Gemini REST API Call (Sequential Candidate Trial)
        if (geminiApiKey && geminiApiKey.trim()) {
          const candidateModels = [
            'gemini-3.6-flash',
            'gemini-3.5-flash',
            'gemini-flash'
          ];
          const uiName = LANG_META[uiLang]?.name || 'Japanese';
          const targetName = LANG_META[targetLang]?.name || 'English';

          const systemPrompt = `You are LingoBot, a warm, encouraging AI conversation partner in LingoBotWebApp. ` +
            `The user's interface language is ${uiName} and their target learning language is ${targetName}. ` +
            `CRITICAL RULE: Always write COMPLETE, fully formed sentences with proper punctuation (. ! ?). Never end mid-sentence. ` +
            (targetLang === 'ja-JP' ? `CRITICAL RULE FOR JAPANESE: When writing in Japanese, ALWAYS write furigana in parentheses immediately after EVERY Kanji word, for example: 空港（くうこう） or 荷物（にもつ） or お預（あず）かり or 手続（てつづ）き so language learners can easily read the pronunciation! ` : '') +
            `Always reply naturally, interactively, and concisely (1 to 3 complete sentences) in ${targetName} so the user can practice listening and speaking. ` +
            `If the user orders food, requests items, or asks for a scenario, roleplay as a friendly conversation partner in that scenario!`;

          const contents = [
            { role: 'user', parts: [{ text: systemPrompt }] },
            { role: 'model', parts: [{ text: `Understood! I will always reply with complete, clear sentences in ${targetName}.` }] }
          ];

          chatMessages.slice(-6).forEach(m => {
            if (m.text && !m.type && !m.isError) {
              contents.push({
                role: m.sender === 'user' ? 'user' : 'model',
                parts: [{ text: m.text }]
              });
            }
          });

          contents.push({ role: 'user', parts: [{ text: userText }] });

          for (const mName of candidateModels) {
            try {
              const geminiUrl = `https://generativelanguage.googleapis.com/v1beta/models/${mName}:generateContent?key=${encodeURIComponent(geminiApiKey.trim())}`;
              const geminiRes = await fetch(geminiUrl, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                  contents: contents,
                  generationConfig: {
                    temperature: 0.7,
                    maxOutputTokens: 800
                  }
                })
              });

              if (geminiRes.ok) {
                const geminiData = await geminiRes.json();
                if (geminiData.candidates && geminiData.candidates[0]?.content?.parts[0]?.text) {
                  replyText = geminiData.candidates[0].content.parts[0].text.trim();
                  connectedModel = mName;
                  break;
                }
              } else {
                const errJson = await geminiRes.json().catch(() => ({}));
                directErrorLog += `[${mName} HTTP ${geminiRes.status}]: ${errJson.error?.message || 'Failed'} | `;
              }
            } catch (err) {
              directErrorLog += `[${mName} Error]: ${err.message} | `;
            }
          }
        }

        // 2. Fallback to Serverless Backend /api/chat if direct call wasn't used or failed
        if (!replyText) {
          try {
            const res = await fetch(`${BACKEND_URL}/api/chat`, {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({
                message: userText,
                history: chatMessages,
                uiLang: uiLang,
                targetLang: targetLang,
                apiKey: geminiApiKey
              })
            });

            if (res.ok) {
              const chatData = await res.json();
              if (chatData.reply && !chatData.error) {
                replyText = chatData.reply;
                connectedModel = chatData.model || 'gemini-flash';
              } else if (chatData.error) {
                directErrorLog += `Backend: ${chatData.error} (${chatData.log || ''})`;
              }
            } else {
              const errData = await res.json().catch(() => ({}));
              directErrorLog += `Backend HTTP ${res.status}: ${errData.error || ''} (${errData.log || ''})`;
            }
          } catch (backendErr) {
            directErrorLog += `Backend Fetch Error: ${backendErr.message}`;
          }
        }

        // Parse rate limit retry seconds (e.g. 429 / RESOURCE_EXHAUSTED / Please retry in 24.172228597s)
        const parseRetryWaitSeconds = (logStr) => {
          if (!logStr) return null;
          const lower = logStr.toLowerCase();
          const isBusy = lower.includes('429') || lower.includes('resource_exhausted') || lower.includes('resourceexhausted') || lower.includes('quota') || lower.includes('rate limit') || lower.includes('too many requests') || lower.includes('please retry in');
          if (!isBusy) return null;

          const match = lower.match(/(?:please\s+retry\s+in|retry[\s\-_]*(?:after|in)|retry\-after)[\s:=]*(\d+(?:\.\d+)?)\s*s?/i);
          if (match && match[1]) {
            return parseFloat(match[1]);
          }
          return 5; // Default short 5-second wait if rate limited without explicit seconds
        };

        const retryWaitSec = parseRetryWaitSeconds(directErrorLog);

        setIsThinking(false);

        // 3. IF SUCCESSFUL: Display AI reply and update Active Connected Model Badge
        if (replyText) {
          setActiveConnectedModel(connectedModel);

          const aiMsg = {
            id: 'ai-' + Date.now(),
            sender: 'ai',
            lang: targetLang,
            modelName: connectedModel,
            text: replyText,
            time: new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' })
          };

          setChatMessages(prev => [...prev, aiMsg]);
          scrollToBottom();
          focusTextInput();

          setTimeout(() => {
            playEdgeTts(aiMsg.id, aiMsg.text, targetLang);
          }, 300);
        } else if (retryWaitSec !== null && retryWaitSec <= 20) {
          // 4. IF BUSY (Retry <= 20s): Display friendly busy message in Vietnamese & Japanese
          setActiveConnectedModel('混雑中 / Busy');

          const busyMsg = {
            id: 'ai-busy-' + Date.now(),
            sender: 'ai',
            isBusy: true,
            lang: uiLang,
            text: `⏳ Hệ thống đang bận. Vui lòng chờ trong giây lát...\n⏳ ただいま混雑（こんざつ）中（ちゅう）です。少（すこ）し待（ま）ってください。`,
            time: new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' })
          };

          setChatMessages(prev => [...prev, busyMsg]);
          scrollToBottom();
          focusTextInput();
        } else {
          // 5. IF FAILED (Retry > 20s or Fatal Error): Display error bubble + text log file + specific wait prompt
          setActiveConnectedModel('未接続 / Error');

          const roundedWait = retryWaitSec !== null ? Math.ceil(retryWaitSec) : null;
          const waitPromptStr = roundedWait ? `\n\n⏳ AIから「約 ${roundedWait} 秒待ってから再試行してください」と要求されています。約 ${roundedWait} 秒ほど待ってから話しかけてください。\n(AI yêu cầu chờ khoảng ${roundedWait} giây trước khi thử lại.)` : '';

          const fullLogText = `========================================\nLingoBotWebApp Error Diagnostic Log\nTime: ${new Date().toLocaleString()}\nWait Timeout: ${retryWaitSec !== null ? retryWaitSec + 's (>20s)' : 'Fatal/Auth Error'}\n========================================\n\n${directErrorLog || 'API Key is missing or invalid.'}`;

          const errorMsg = {
            id: 'ai-error-' + Date.now(),
            sender: 'ai',
            isError: true,
            errorLogText: fullLogText,
            lang: uiLang,
            text: `❌ Đã xảy ra lỗi. Vui lòng kiểm tra nhật ký lỗi.\n❌ エラーが発生（はっせい）しました。ログを確認（かくにん）してください。${waitPromptStr}`,
            time: new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' })
          };

          setChatMessages(prev => [...prev, errorMsg]);
          scrollToBottom();
          focusTextInput();
        }
      };

      // STT Speech Recognition Toggle
      const toggleRecording = (targetLangCode, onFinalText) => {
        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        if (!SpeechRecognition) {
          alert('Web Speech API is not supported in this browser. Please use Chrome or Edge.');
          return;
        }

        if (isRecording) {
          if (recognitionRef.current) recognitionRef.current.stop();
          setIsRecording(false);
          return;
        }

        const rec = new SpeechRecognition();
        recognitionRef.current = rec;
        rec.lang = targetLangCode;
        rec.interimResults = true;
        rec.continuous = false;

        setLiveTranscript('');
        setEvalResult(null);

        rec.onstart = () => setIsRecording(true);

        rec.onresult = (e) => {
          let interim = '', final = '';
          for (let i = e.resultIndex; i < e.results.length; ++i) {
            if (e.results[i].isFinal) final += e.results[i][0].transcript;
            else interim += e.results[i][0].transcript;
          }
          if (interim) setLiveTranscript(interim);
          if (final) {
            setLiveTranscript(final);
            onFinalText(final.trim());
          }
        };

        rec.onerror = (e) => { setIsRecording(false); alert(`Mic error: ${e.error}`); };
        rec.onend = () => setIsRecording(false);
        rec.start();
      };

      // Export Lesson Summary PDF
      const handleExportPdf = () => {
        const element = document.getElementById('pdf-report-element');
        if (!element) return;

        const opt = {
          margin:       0.4,
          filename:     `LingoBot_Lesson_Summary_${Date.now()}.pdf`,
          image:        { type: 'jpeg', quality: 0.98 },
          html2canvas:  { scale: 2, useCORS: true },
          jsPDF:        { unit: 'in', format: 'letter', orientation: 'portrait' }
        };

        html2pdf().set(opt).from(element).save();
      };

      return (
        <div class="app-container">
          {/* Compact Single-Row Header */}
          <header class="glass-panel app-header-compact">
            <div class="brand-section-compact">
              <div class="brand-logo-sm">🤖</div>
              <div>
                <div class="brand-title-sm">LingoBotWebApp</div>
                <div class="brand-subtitle-sm">{dict.subtitle}</div>
              </div>
            </div>

            <nav class="nav-tabs-compact">
              <button
                class={`nav-tab-sm ${activeTab === 'chat' ? 'active' : ''}`}
                onClick={() => setActiveTab('chat')}
              >
                {dict.chatTab}
              </button>
              <button
                class={`nav-tab-sm ${activeTab === 'shadowing' ? 'active' : ''}`}
                onClick={() => setActiveTab('shadowing')}
              >
                {dict.shadowingTab}
              </button>
            </nav>

            <div class="header-controls-sm">
              <span class="badge-sm badge-edge">
                {dict.uiLangLabel}: 🇻🇳 Tiếng Việt
              </span>
              <span class="badge-sm badge-sage">
                {dict.targetLangLabel}: {targetLang === 'vi-VN' ? '🇻🇳 Tiếng Việt' : targetLang === 'ja-JP' ? '🇯🇵 日本語' : '🇺🇸 English'}
              </span>
              {activeConnectedModel && (
                <span class="badge-sm badge-sage" style={{ background: 'var(--accent-terracotta)', color: 'white' }}>
                  🤖 {activeConnectedModel}
                </span>
              )}
              <button
                class="btn-end-lesson-sm"
                style={{
                  background: ttsEngine === 'edge' ? 'var(--grad-terracotta)' : 'linear-gradient(135deg, #2a9d8f 0%, #264653 100%)',
                  color: '#ffffff',
                  fontWeight: '700'
                }}
                onClick={() => setTtsEngine(prev => prev === 'edge' ? 'gen' : 'edge')}
                title="Toggle TTS Engine (Edge-TTS vs Standard Gen)"
              >
                🔊 {ttsEngine === 'edge' ? 'Edge' : 'Gen'}
              </button>
              <button
                class="btn-end-lesson-sm"
                style={{ background: 'linear-gradient(135deg, #f4a261 0%, #e07a5f 100%)' }}
                onClick={handleResetChat}
                title="Reset Chat & Clear History"
              >
                🔄 Đặt lại
              </button>
              <button
                class="btn-end-lesson-sm"
                onClick={() => setShowPdfModal(true)}
              >
                {dict.endLesson}
              </button>
            </div>
          </header>

          {/* MAIN CONVERSATION PRACTICE SCREEN */}
          {activeTab === 'chat' && (
            <div class="glass-panel chat-container">
              <div class="chat-messages" ref={chatMessagesRef}>
                {chatMessages.map(msg => {
                  const isPlaying = playingId === msg.id;
                  const isLoading = loadingId === msg.id;
                  return (
                    <div key={msg.id} class={`chat-bubble ${msg.sender} ${msg.isError ? 'error-bubble' : ''}`}>
                      <div style={{ whiteSpace: 'pre-line' }}><FuriganaText text={msg.text} /></div>
                      <div class="chat-bubble-meta">
                        <span>{msg.sender === 'ai' ? `🤖 LingoBot ${msg.modelName ? `(${msg.modelName})` : ''}` : `👤 User (${LANG_META[uiLang]?.name})`}</span>
                        <span>{msg.time}</span>
                      </div>

                      {/* Step 1 Interactive Onboarding Choice Chips (UI Language) */}
                      {msg.type === 'onboarding_ui' && onboardingStep === 'ui_lang' && (
                        <div style={{ marginTop: '14px', display: 'flex', gap: '10px', flexWrap: 'wrap' }}>
                          <button class="btn btn-terracotta" onClick={() => handleSelectUiLang('vi-VN')}>
                            🇻🇳 Tiếng Việt
                          </button>
                          <button class="btn btn-terracotta" onClick={() => handleSelectUiLang('ja-JP')}>
                            <FuriganaText text="🇯🇵 日本語（にほんご）" />
                          </button>
                          <button class="btn btn-terracotta" onClick={() => handleSelectUiLang('en-US')}>
                            🇺🇸 English
                          </button>
                        </div>
                      )}

                      {/* Step 2 Interactive Onboarding Choice Chips (Target Learning Language) */}
                      {msg.type === 'onboarding_target' && onboardingStep === 'target_lang' && (
                        <div style={{ marginTop: '14px', display: 'flex', gap: '10px', flexWrap: 'wrap' }}>
                          <button class="btn btn-sage" onClick={() => handleSelectTargetLang('vi-VN')}>
                            🇻🇳 Tiếng Việt (Vietnamese)
                          </button>
                          <button class="btn btn-sage" onClick={() => handleSelectTargetLang('ja-JP')}>
                            <FuriganaText text="🇯🇵 日本語（にほんご） (Japanese)" />
                          </button>
                          <button class="btn btn-sage" onClick={() => handleSelectTargetLang('en-US')}>
                            🇺🇸 English (US English)
                          </button>
                        </div>
                      )}

                      {/* Error Log Download Button */}
                      {msg.isError && msg.errorLogText && (
                        <div class="chat-bubble-actions" style={{ marginTop: '10px' }}>
                          <button
                            class="btn btn-secondary"
                            style={{ padding: '6px 14px', fontSize: '0.82rem', background: '#ffffff', color: '#cf1322', border: '1px solid #ff4d4f' }}
                            onClick={() => downloadTextFile(`gemini_error_log_${Date.now()}.txt`, msg.errorLogText)}
                          >
                            📥 Tải nhật ký lỗi / ログをダウンロード (.txt)
                          </button>
                        </div>
                      )}

                      {/* Standard AI Message Action Buttons */}
                      {msg.sender === 'ai' && !msg.type && !msg.isError && (
                        <div class="chat-bubble-actions">
                          {/* 🔊 Play Voice Button */}
                          <button
                            class={`btn btn-terracotta ${isPlaying ? 'playing' : ''}`}
                            style={{ padding: '6px 14px', fontSize: '0.82rem' }}
                            disabled={isLoading}
                            onClick={() => playEdgeTts(msg.id, msg.text, msg.lang || targetLang)}
                          >
                            {isLoading ? dict.generating : isPlaying ? dict.stopVoice : dict.playVoice}
                          </button>

                          {/* ⬇️ Download MP3 Button */}
                          <button
                            class="btn btn-secondary"
                            style={{ padding: '6px 14px', fontSize: '0.82rem' }}
                            onClick={() => downloadMp3(msg.id, msg.text, msg.lang || targetLang, `lingobot_${msg.id}.mp3`)}
                          >
                            {dict.downloadMp3}
                          </button>
                        </div>
                      )}
                    </div>
                  );
                })}
                {isThinking && (
                  <div class="chat-bubble ai thinking-bubble" style={{ alignSelf: 'flex-start', background: '#ffffff', border: '1px solid var(--border-warm)', borderRadius: 'var(--radius-lg)', padding: '14px 18px', boxShadow: 'var(--shadow-sm)', margin: '4px 0' }}>
                    <div style={{ display: 'flex', alignItems: 'center', gap: '8px', color: 'var(--accent-terracotta-dark)', fontWeight: 600, fontSize: '0.92rem' }}>
                      <span style={{ fontSize: '1.2rem' }}>⏳</span>
                      <span>
                        {uiLang === 'ja-JP' ? '🤖 ちょっと待ってください...（AIが考え中）' :
                         uiLang === 'vi-VN' ? '🤖 Vui lòng chờ một chút... (AI đang suy nghĩ)' :
                         uiLang === 'en-US' ? '🤖 Please wait a moment... (AI is thinking)' :
                         '🤖 Vui lòng chờ một chút... / ちょっと待ってください...'}
                      </span>
                    </div>
                  </div>
                )}
                <div ref={messagesEndRef} style={{ float: 'left', clear: 'both' }} />
              </div>

              {/* Chat Input & End Lesson Bar */}
              <div style={{ padding: '20px 24px', borderTop: '1px solid var(--border-warm)', background: 'rgba(255, 253, 249, 0.95)', display: 'flex', gap: '12px', alignItems: 'center' }}>
                <input
                  id="chat-text-input-field"
                  ref={textInputRef}
                  type="text"
                  class="form-input"
                  placeholder={dict.inputPlaceholder}
                  onKeyDown={(e) => {
                    if (e.key === 'Enter') {
                      e.preventDefault();
                      const val = e.target.value.trim();
                      if (val) {
                        e.target.value = '';
                        handleUserChat(val);
                      }
                    }
                  }}
                />

                <button
                  class="btn btn-terracotta"
                  style={{ padding: '12px 18px', whiteSpace: 'nowrap' }}
                  onClick={() => {
                    const el = document.getElementById('chat-text-input-field');
                    if (el && el.value.trim()) {
                      handleUserChat(el.value);
                      el.value = '';
                    }
                  }}
                >
                  {dict.send}
                </button>

                <button
                  class={`mic-button ${isRecording ? 'recording' : ''}`}
                  style={{ width: '50px', height: '50px', fontSize: '1.2rem' }}
                  title="Speak to AI"
                  onClick={() => {
                    toggleRecording(targetLang, (finalText) => {
                      handleUserChat(finalText);
                    });
                  }}
                >
                  {isRecording ? '🛑' : '🎙️'}
                </button>

                <button
                  class="btn btn-end-lesson"
                  style={{ padding: '12px 18px', fontSize: '0.9rem', whiteSpace: 'nowrap' }}
                  onClick={() => setShowPdfModal(true)}
                >
                  {dict.endLesson}
                </button>
              </div>
            </div>
          )}

          {/* SECONDARY SHADOWING MODE */}
          {activeTab === 'shadowing' && (
            <div class="shadowing-layout">
              {/* Sidebar Library */}
              <div class="glass-panel sentence-sidebar">
                <div style={{ fontWeight: 700, fontSize: '1rem', color: 'var(--text-main)', marginBottom: '8px' }}>
                  📚 {dict.shadowingTab} Library ({filteredSentences.length})
                </div>

                {/* Level / Category Filter Chips */}
                <div style={{ display: 'flex', gap: '4px', flexWrap: 'wrap', marginBottom: '12px' }}>
                  {[
                    { id: 'all', label: 'すべて / All' },
                    { id: 'ja-beginner', label: '🌱 初級' },
                    { id: 'ja-intermediate', label: '🌿 中級' },
                    { id: 'ja-advanced', label: '🌳 上級' },
                    { id: 'en-business', label: '🇺🇸 Eng' },
                    { id: 'vi-daily', label: '🇻🇳 Việt' }
                  ].map(cat => (
                    <button
                      key={cat.id}
                      class="badge-sm"
                      style={{
                        cursor: 'pointer',
                        border: selectedCategory === cat.id ? '1px solid var(--accent-terracotta)' : '1px solid var(--border-warm)',
                        background: selectedCategory === cat.id ? 'var(--accent-terracotta)' : '#ffffff',
                        color: selectedCategory === cat.id ? '#ffffff' : 'var(--text-main)',
                        padding: '4px 8px',
                        fontSize: '0.72rem',
                        fontWeight: 600
                      }}
                      onClick={() => setSelectedCategory(cat.id)}
                    >
                      {cat.label}
                    </button>
                  ))}
                </div>

                <div class="sentence-list">
                  {filteredSentences.map((sent) => {
                    const globalIdx = SAMPLE_SENTENCES.indexOf(sent);
                    const isSelected = globalIdx === currentSentenceIdx;
                    return (
                      <div
                        key={sent.id}
                        class={`sentence-item ${isSelected ? 'active' : ''}`}
                        onClick={() => {
                          setCurrentSentenceIdx(globalIdx);
                          setEvalResult(null);
                          setLiveTranscript('');
                        }}
                      >
                        <div class="sentence-item-text">
                          <FuriganaText text={sent.text} />
                        </div>
                        <div class="sentence-item-meta">
                          <span class="badge-sm badge-sage" style={{ fontSize: '0.65rem', padding: '1px 6px' }}>{sent.levelLabel || sent.lang}</span>
                          <span>{LANG_META[sent.lang]?.flag}</span>
                        </div>
                      </div>
                    );
                  })}
                </div>
              </div>

              {/* Practice Card */}
              <div class="glass-panel practice-card">
                <div class="target-sentence-box">
                  <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: '10px' }}>
                    <div class="target-label">
                      ✨ Target Sentence ({LANG_META[currentSentence.lang]?.name})
                    </div>
                    <span class="badge badge-sage" style={{ fontSize: '0.8rem' }}>{currentSentence.levelLabel || currentSentence.lang}</span>
                  </div>

                  <div class="target-text" style={{ fontSize: '1.25rem', lineHeight: '1.7' }}>
                    <FuriganaText text={currentSentence.text} />
                  </div>
                  
                  {currentSentence.phonetic && (
                    <div style={{ marginTop: '8px', fontSize: '0.88rem', fontFamily: 'var(--font-mono)', color: 'var(--text-dim)' }}>
                      IPA / 読み: {currentSentence.phonetic}
                    </div>
                  )}

                  <div style={{ marginTop: '10px', fontSize: '0.95rem', color: 'var(--text-muted)' }}>
                    Translation: {currentSentence.translation}
                  </div>
                </div>

                {/* Controls Bar */}
                <div class="action-controls">
                  <button
                    class={`btn btn-terracotta ${playingId === `sent-${currentSentence.id}` ? 'playing' : ''}`}
                    style={{ padding: '14px 24px' }}
                    disabled={loadingId === `sent-${currentSentence.id}`}
                    onClick={() => playEdgeTts(`sent-${currentSentence.id}`, currentSentence.text, currentSentence.lang)}
                  >
                    {loadingId === `sent-${currentSentence.id}` ? dict.generating : playingId === `sent-${currentSentence.id}` ? dict.stopVoice : dict.playVoice}
                  </button>

                  <button
                    class="btn btn-secondary"
                    style={{ padding: '14px 20px' }}
                    onClick={() => downloadMp3(`sent-${currentSentence.id}`, currentSentence.text, currentSentence.lang, `model_${currentSentence.lang}.mp3`)}
                  >
                    {dict.downloadMp3}
                  </button>

                  <button
                    class={`mic-button ${isRecording ? 'recording' : ''}`}
                    title="Click to speak"
                    onClick={() => {
                      toggleRecording(currentSentence.lang, (finalText) => {
                        const res = evaluatePronunciation(currentSentence.text, finalText);
                        setEvalResult(res);
                      });
                    }}
                  >
                    {isRecording ? '🛑' : '🎙️'}
                  </button>
                </div>

                {/* Live Transcript Output */}
                <div class="live-transcript-container">
                  <div style={{ fontSize: '0.8rem', fontWeight: 700, color: 'var(--text-dim)', textTransform: 'uppercase', marginBottom: '6px' }}>
                    🎙️ Recognized Speech (Web Speech STT)
                  </div>
                  <div class={liveTranscript ? 'transcript-final' : 'transcript-interim'}>
                    {liveTranscript || (isRecording ? 'Listening... Speak clearly into mic' : 'Click mic button above and read aloud')}
                  </div>
                </div>

                {/* Evaluation Card & Pronunciation Advice */}
                {evalResult && (
                  <div>
                    <div class="score-result-panel">
                      <div class="score-header">
                        <div>
                          <div style={{ fontSize: '0.85rem', color: 'var(--text-muted)', fontWeight: 600 }}>
                            Accuracy Score
                          </div>
                          <div style={{ fontSize: '1.3rem', fontWeight: 700, color: evalResult.gradeColor }}>
                            {evalResult.grade}
                          </div>
                        </div>
                        <div class="score-badge" style={{ color: evalResult.gradeColor }}>
                          {evalResult.score}%
                        </div>
                      </div>

                      <div class="word-diff-container" style={{ marginTop: '12px' }}>
                        {evalResult.diff.map((item, i) => (
                          <span key={i} class={`diff-word diff-${item.type}`}>
                            {item.word} {item.said ? `(said: ${item.said})` : ''}
                          </span>
                        ))}
                      </div>
                    </div>

                    {/* Pronunciation & Mouth Position Advice Guide */}
                    <div class="pronunciation-advice-box">
                      <div class="pronunciation-advice-title">
                        👄 正しい発音 ＆ 口の形のアドバイス (Pronunciation & Mouth Position Guide)
                      </div>
                      <div style={{ fontSize: '0.88rem', color: 'var(--text-main)', lineHeight: 1.5 }}>
                        <div><strong>正解の読み方 (IPA):</strong> <code style={{ color: 'var(--accent-terracotta-dark)', fontFamily: 'var(--font-mono)' }}>{currentSentence.phonetic}</code></div>
                        <div style={{ marginTop: '6px' }}><strong>発音アドバイス (Advice):</strong> {currentSentence.advice?.ja || currentSentence.advice?.vi}</div>
                        <div style={{ marginTop: '4px', color: 'var(--text-muted)' }}>{currentSentence.advice?.mouthTip}</div>
                      </div>
                    </div>
                  </div>
                )}
              </div>
            </div>
          )}

          {/* PDF LESSON SUMMARY MODAL */}
          {showPdfModal && (
            <div class="pdf-modal-overlay">
              <div class="pdf-modal-card">
                <div style={{ padding: '16px 24px', borderBottom: '1px solid var(--border-warm)', display: 'flex', justifyContent: 'space-between', alignItems: 'center', background: '#fdfbf7' }}>
                  <div style={{ fontWeight: 700, fontSize: '1.1rem', color: 'var(--accent-terracotta-dark)' }}>
                    📄 {dict.pdfTitle}
                  </div>
                  <button class="btn btn-secondary" style={{ padding: '6px 12px' }} onClick={() => setShowPdfModal(false)}>✕</button>
                </div>

                {/* Printable PDF Content Section */}
                <div class="pdf-report-content" id="pdf-report-element">
                  <div class="pdf-report-header">
                    <div>
                      <div class="pdf-report-title">🤖 LingoBotWebApp</div>
                      <div style={{ fontSize: '0.9rem', color: '#5e5045', marginTop: '4px' }}>
                        Lesson Summary Report / Báo cáo tóm tắt bài học
                      </div>
                    </div>
                    <div style={{ textAlign: 'right', fontSize: '0.85rem', color: '#8e7c6d' }}>
                      <div>Date: {new Date().toLocaleDateString()}</div>
                      <div>Time: {new Date().toLocaleTimeString()}</div>
                    </div>
                  </div>

                  {/* Summary Stats */}
                  <div class="pdf-section" style={{ background: '#fcf9f4', padding: '16px', borderRadius: '12px', border: '1px solid #e8ded0' }}>
                    <div class="pdf-section-title">📊 Lesson Overview</div>
                    <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr 1fr', gap: '12px', textAlign: 'center' }}>
                      <div>
                        <div style={{ fontSize: '0.8rem', color: '#8e7c6d' }}>UI Language</div>
                        <div style={{ fontSize: '1.1rem', fontWeight: 800, color: '#e07a5f' }}>{LANG_META[uiLang]?.name}</div>
                      </div>
                      <div>
                        <div style={{ fontSize: '0.8rem', color: '#8e7c6d' }}>Target Language</div>
                        <div style={{ fontSize: '1.1rem', fontWeight: 800, color: '#2a9d8f' }}>{LANG_META[targetLang]?.name}</div>
                      </div>
                      <div>
                        <div style={{ fontSize: '0.8rem', color: '#8e7c6d' }}>AI Model</div>
                        <div style={{ fontSize: '1rem', fontWeight: 700, color: '#2d231d' }}>{activeConnectedModel || 'Gemini AI'}</div>
                      </div>
                    </div>
                  </div>

                  {/* Conversation Transcripts */}
                  <div class="pdf-section">
                    <div class="pdf-section-title">💬 Conversation History</div>
                    {chatMessages.map((msg, i) => (
                      <div key={i} class="pdf-chat-item">
                        <div style={{ fontWeight: 700, fontSize: '0.85rem', color: msg.sender === 'ai' ? '#e07a5f' : '#2a9d8f' }}>
                          {msg.sender === 'ai' ? '🤖 LingoBot AI' : '👤 User'}:
                        </div>
                        <div style={{ marginTop: '4px', whiteSpace: 'pre-line' }}>{msg.text}</div>
                      </div>
                    ))}
                  </div>

                  {/* Detailed Expression & Grammar Advice Section */}
                  <div class="pdf-section" style={{ borderTop: '2px solid var(--accent-amber)', paddingTop: '16px' }}>
                    <div class="pdf-section-title">💡 レッスン振り返りアドバイス ＆ 表現の改善ポイント / Expression & Grammar Advice</div>
                    {chatMessages.filter(m => 
                      m.sender === 'user' && 
                      !m.type && 
                      !m.text.startsWith('🔑') && 
                      !m.text.startsWith('[使用言語') && 
                      !m.text.startsWith('[目標言語')
                    ).map((m, idx) => {
                      const adviceItem = generateExpressionAdvice(m.text, targetLang, uiLang);
                      return (
                        <div key={idx} class="pdf-advice-item" style={{ background: '#ffffff', border: '1px solid #e8ded0', borderLeft: '4px solid #e07a5f', borderRadius: '12px', padding: '16px', marginBottom: '14px', boxShadow: '0 2px 8px rgba(0,0,0,0.04)' }}>
                          <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: '8px' }}>
                            <span style={{ fontSize: '0.8rem', fontWeight: 700, padding: '3px 8px', borderRadius: '4px', background: 'rgba(224, 122, 95, 0.12)', color: '#e07a5f' }}>
                              📌 {adviceItem.category}
                            </span>
                            <span style={{ fontSize: '0.78rem', color: '#8e7c6d' }}>#会話分析 {idx + 1}</span>
                          </div>

                          <div class="user-said" style={{ color: '#cf1322', fontWeight: 600, fontSize: '0.92rem', marginBottom: '6px' }}>
                            🗣️ 実際の発話 / Your Input: "{m.text}"
                          </div>
                          
                          <div class="better-say" style={{ color: '#2a9d8f', fontWeight: 700, fontSize: '0.98rem', marginBottom: '10px', background: 'rgba(42, 157, 143, 0.08)', padding: '10px 14px', borderRadius: '8px' }}>
                            <div style={{ marginBottom: '4px' }}>✨ おすすめの洗練された表現 / Recommended Expression:</div>
                            {adviceItem.betterList ? (
                              <ul style={{ margin: '4px 0 0 18px', padding: 0 }}>
                                {adviceItem.betterList.map((expr, eIdx) => (
                                  <li key={eIdx} style={{ listStyleType: 'disc', marginTop: '2px' }}>{expr}</li>
                                ))}
                              </ul>
                            ) : (
                              <div>{adviceItem.better}</div>
                            )}
                          </div>
                          
                          <div class="pdf-advice-detail" style={{ fontSize: '0.88rem', color: '#4a3e35', lineHeight: 1.6 }}>
                            <div style={{ marginBottom: '4px' }}><strong>📝 解説 ＆ 改善ポイント:</strong> {adviceItem.explanation}</div>
                            <div style={{ marginBottom: '4px' }}><strong>💡 表現の活用ポイント:</strong> {adviceItem.usage}</div>
                            <div><strong>🌟 応用実践例文:</strong> <em>"{adviceItem.example}"</em> <span style={{ color: '#8e7c6d' }}>({adviceItem.exampleTrans})</span></div>
                          </div>
                        </div>
                      );
                    })}
                  </div>

                  {/* Feedback */}
                  <div class="pdf-section" style={{ borderTop: '1px dashed #e8ded0', paddingTop: '16px' }}>
                    <div class="pdf-section-title">💡 Tutor Feedback</div>
                    <div style={{ fontSize: '0.92rem', color: '#5e5045', lineHeight: 1.6 }}>
                      Congratulations on completing your practice session on <strong>LingoBotWebApp</strong>! 
                      Combining active speech practice with instant native audio feedback accelerates fluency. Keep practicing daily!
                    </div>
                  </div>
                </div>

                {/* PDF Action Buttons */}
                <div style={{ padding: '16px 24px', borderTop: '1px solid var(--border-warm)', background: '#fdfbf7', display: 'flex', justify: 'flex-end', gap: '12px' }}>
                  <button class="btn btn-secondary" onClick={() => window.print()}>{dict.print}</button>
                  <button class="btn btn-terracotta" onClick={handleExportPdf}>{dict.downloadPdf}</button>
                </div>
              </div>
            </div>
          )}
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
