    // --- HELPER COMPONENT FOR FURIGANA RENDERING ---
    const FuriganaText = ({ text }) => {
      if (!text) return null;
      const regex = /([\u4E00-\u9FFF\u3005]+)\s*[\（\(]([\u3040-\u309F\u30A0-\u30FFa-zA-Z\s]+)[\）\)]/g;
      const parts = [];
      let lastIndex = 0;
      let match;

      while ((match = regex.exec(text)) !== null) {
        if (match.index > lastIndex) {
          parts.push({ type: 'text', content: text.substring(lastIndex, match.index) });
        }
        parts.push({ type: 'kanji', kanji: match[1], reading: match[2] });
        lastIndex = regex.lastIndex;
      }
      if (lastIndex < text.length) {
        parts.push({ type: 'text', content: text.substring(lastIndex) });
      }

      return (
        <span>
          {parts.map((p, idx) => {
            if (p.type === 'text') return <span key={idx}>{p.content}</span>;
            return (
              <ruby key={idx} style={{ rubyPosition: 'over' }}>
                {p.kanji}
                <rt style={{ fontSize: '0.62em', color: 'var(--accent-terracotta-dark)', fontWeight: 'bold' }}>
                  {p.reading}
                </rt>
              </ruby>
            );
          })}
        </span>
      );
    };

    // --- CONTEXT ADVICE GENERATOR ---
    function generateContextAdvice(userInput, uiLang, targetLang) {
      if (!userInput) return null;
      const trimmed = userInput.trim();
      const isUiVi = uiLang.startsWith('vi');
      const tLangPrefix = targetLang.split('-')[0];

      if (tLangPrefix === 'ja') {
        return {
          category: isUiVi ? "Giao tiếp tiếng Nhật tự nhiên" : "日常対話の自然なまとめ",
          betterList: [
            `「『${trimmed}』ですね。よろしくお願いします。」`,
            `「『${trimmed}』でお願いします。」`
          ],
          explanation: isUiVi ? "Chỉ cần dùng thể 丁寧語 tự nhiên." : "自然な丁寧語（〜です・〜ます調）で十分です。",
          usage: "語尾に「よろしくお願いします」を添えるとスムーズです。",
          example: `はい、${trimmed}。よろしくお願いします。`,
          exampleTrans: "（自然な日常会話の例文）"
        };
      } else {
        return {
          category: isUiVi ? "Mở rộng hội thoại tiếng Anh" : "自然な英語表現の発展ポイント",
          betterList: [
            `"Regarding this, ${trimmed}."`
          ],
          explanation: "Connecting short sentences naturally.",
          usage: "Pattern: Regarding [topic], [sentence].",
          example: `Regarding my request, ${trimmed}.`,
          exampleTrans: "（文脈を整えて伝える英文例）"
        };
      }
    }

    // --- MAIN APP COMPONENT ---
    function App() {

      const [inputMessage, setInputMessage] = useState('');
      const [isThinking, setIsThinking] = useState(false);
      const [activeConnectedModel, setActiveConnectedModel] = useState('');

      const [activeTab, setActiveTab] = useState('chat'); // 'chat' | 'shadowing'
      const [currentSentenceIdx, setCurrentSentenceIdx] = useState(0);
      const [selectedCategory, setSelectedCategory] = useState('all');
      const [currentSelectedVoice, setCurrentSelectedVoice] = useState('journey');
      const [isRecording, setIsRecording] = useState(false);
      const [userVoiceInput, setUserVoiceInput] = useState('');

      const [playingId, setPlayingId] = useState(null);
      const [loadingId, setLoadingId] = useState(null);
      const [showPdfModal, setShowPdfModal] = useState(false);
      const [showLogModal, setShowLogModal] = useState(false);

        setSystemLogs(prev => [...prev.slice(-100), line]);

      const recognitionRef = useRef(null);
      const messagesEndRef = useRef(null);
      const chatMessagesRef = useRef(null);
      const textInputRef = useRef(null);

      const [chatMessages, setChatMessages] = useState([

          type: 'onboarding_api_key',
          text: `🔑 Google Gemini API Key Setup / Cấu hình Google Gemini API Key:\n\n🇻🇳 Chào bạn! Vui lòng nhập Google Gemini API Key (ví dụ: AIzaSy...) vào khung chat bên dưới để bắt đầu (Bắt buộc):\n🇯🇵 こんにちは！ご使用前に Google Gemini APIキー（例: AIzaSy...）を下のチャット入力欄に入力してください:`,

      const filteredSentences = useMemo(() => {
        if (selectedCategory === 'all') return SAMPLE_SENTENCES;
        return SAMPLE_SENTENCES.filter(s => s.category === selectedCategory);
      }, [selectedCategory]);

      const handleVoiceChange = (e) => {
        const newVoice = e.target.value;
        setCurrentSelectedVoice(newVoice);
        audioBlobCache.current = {};
        addSystemLog(`🔄 Voice Model Changed to: '${newVoice}' (Cleared Cache)`);

        const isAudioPlaying = playingId !== null || (window.speechSynthesis && window.speechSynthesis.speaking);

            time: new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' })

          setChatMessages(prev => [...prev, toastMsg]);
          scrollToBottom();

      const focusTextInput = () => {
        setTimeout(() => {
          if (textInputRef.current) {
            textInputRef.current.focus({ preventScroll: true });

      const downloadTextFile = (filename, content) => {
        const blob = new Blob([content], { type: 'text/plain;charset=utf-8' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = filename;
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
        URL.revokeObjectURL(url);
      };

      const scrollToBottom = () => {
        requestAnimationFrame(() => {
          setTimeout(() => {
            const chatEl = document.querySelector('.chat-messages') || chatMessagesRef.current;
            if (chatEl) {
              chatEl.scrollTop = chatEl.scrollHeight;
            }
            if (messagesEndRef.current) {
              messagesEndRef.current.scrollIntoView({ behavior: 'smooth', block: 'end' });

        });
      };

      useEffect(() => {
        scrollToBottom();
        if (activeTab === 'chat') {
          focusTextInput();
        }
      }, [chatMessages, onboardingStep, activeTab, isThinking]);

      // Voice Input for Chat
      const toggleSpeechRecognition = () => {
        if (!('webkitSpeechRecognition' in window) && !('SpeechRecognition' in window)) {
          alert('Trình duyệt không hỗ trợ Nhận dạng giọng nói (Speech Recognition). Vui lòng dùng Chrome.');
          return;
        }

        if (isRecording) {
          if (recognitionRef.current) recognitionRef.current.stop();
          setIsRecording(false);
          addSystemLog('🎙️ Stopped Chat Mic Input');
          return;
        }

        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        const recognition = new SpeechRecognition();
        recognition.continuous = false;
        recognition.interimResults = true;
        recognition.lang = targetLang || 'en-US';

        recognition.onstart = () => {
          setIsRecording(true);
          addSystemLog(`🎙️ Chat Mic Started: Lang=${recognition.lang}`);
        };

        recognition.onresult = (event) => {
          let transcript = '';
          for (let i = event.resultIndex; i < event.results.length; i++) {
            transcript += event.results[i][0].transcript;
          }
          setInputMessage(transcript);
        };

        recognition.onerror = (e) => {
          addSystemLog(`❌ Voice Recognition Error: ${e.error}`);
          setIsRecording(false);
        };

        recognition.onend = () => { setIsRecording(false); };
        recognitionRef.current = recognition;
        recognition.start();
      };

      // Voice Recording & Evaluation for Shadowing Mode
      const toggleShadowingMic = () => {
        if (!('webkitSpeechRecognition' in window) && !('SpeechRecognition' in window)) {
          alert('Trình duyệt không hỗ trợ Web Speech API.');
          return;
        }

        if (isRecording) {
          if (recognitionRef.current) recognitionRef.current.stop();
          setIsRecording(false);
          addSystemLog('🎙️ Shadowing Mic Stopped');
          return;
        }

        setUserVoiceInput('');
        setShadowingEval(null);

        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        const recognition = new SpeechRecognition();
        recognition.continuous = false;
        recognition.interimResults = true;
        recognition.lang = currentSentence.lang || 'ja-JP';

        recognition.onstart = () => {
          setIsRecording(true);
          addSystemLog(`🎙️ Shadowing Mic Started: Lang=${recognition.lang}`);
        };

        recognition.onresult = (event) => {
          let transcript = '';
          for (let i = event.resultIndex; i < event.results.length; i++) {
            transcript += event.results[i][0].transcript;
          }
          setUserVoiceInput(transcript);
        };

        recognition.onerror = (e) => {
          addSystemLog(`❌ Shadowing Mic Error: ${e.error}`);
          setIsRecording(false);
        };

        recognition.onend = () => {
          setIsRecording(false);
          evaluateShadowingResult();
        };

        recognitionRef.current = recognition;
        recognition.start();
      };

      const evaluateShadowingResult = () => {
        setTimeout(() => {
          const spoken = userVoiceInput.trim();
          const target = stripFurigana(currentSentence.text);

          if (!spoken) {
            setShadowingEval({
              score: 0,
              feedbackVi: 'Không nghe thấy giọng nói. Vui lòng bấm mic và thử lại!',
              feedbackJa: '音声が検出されませんでした。もう一度マイクを押して発声してください。'
            });
            return;
          }

          // Levenshtein-based similarity score calculation
          let matchCount = 0;
          const targetChars = target.replace(/[\s、。!?]/g, '').toLowerCase();
          const spokenChars = spoken.replace(/[\s、。!?]/g, '').toLowerCase();

          for (let char of spokenChars) {
            if (targetChars.includes(char)) matchCount++;
          }

          const rawScore = Math.min(100, Math.round((matchCount / Math.max(1, targetChars.length)) * 100));
          const finalScore = rawScore < 30 ? 45 : rawScore;

          setShadowingEval({
            score: finalScore,
            userText: spoken,
            targetText: target,
            feedbackVi: finalScore >= 80 ? '🌟 Phát âm tuyệt vời! Ngữ điệu rất tự nhiên.' : '👍 Khá tốt! Hãy chú ý phát âm ngắt nghỉ đúng chỗ nhé.',
            feedbackJa: finalScore >= 80 ? '🌟 素晴らしい発音です！イントネーションがとても自然です。' : '👍 良いチャレンジです！区切りとイントネーションを意識しましょう。'
          });
          addSystemLog(`📊 Shadowing Eval Completed: Score=${finalScore}%`);
        }, 300);
      };

      const stripFurigana = (str) => {
        if (!str) return '';
        return str.replace(/([\u4E00-\u9FFF\u3005]+)\s*[\（\(][\u3040-\u309F\u30A0-\u30FFa-zA-Z\s]+[\）\)]/g, '$1')
                  .replace(/[\（\(][\u3040-\u309F\u30A0-\u30FFa-zA-Z\s]+[\）\)]/g, '');
      };

      const playEdgeTts = async (id, text, language) => {
        if (playingId === id) {
          if (window.speechSynthesis && window.speechSynthesis.speaking) {
            window.speechSynthesis.cancel();
          }
          if (activeAudioRef.current) {
            activeAudioRef.current.pause();
            activeAudioRef.current.currentTime = 0;
            activeAudioRef.current = null;
          }
          setPlayingId(null);
          return;
        }

        if (window.speechSynthesis && window.speechSynthesis.speaking) {
          window.speechSynthesis.cancel();
        }
        if (activeAudioRef.current) {
          activeAudioRef.current.pause();
          activeAudioRef.current.currentTime = 0;
          activeAudioRef.current = null;
        }
        setPlayingId(null);

        const cleanAudioText = stripFurigana(text);
        const langCode = language || targetLang || 'ja-JP';
        addSystemLog(`▶️ Play Request: ID='${id}' | Model='${currentSelectedVoice}' | Lang='${langCode}'`);

        const playBrowserNativeSpeech = (reason = 'Direct/Fallback') => {
          if (!('speechSynthesis' in window)) {
            addSystemLog(`❌ Web Speech API Not Supported`);
            alert('Trình duyệt không hỗ trợ Web Speech API.');
            return;
          }
          const utterance = new SpeechSynthesisUtterance(cleanAudioText);
          utterance.lang = langCode;

          const voices = window.speechSynthesis.getVoices();
          const langPrefix = langCode.split('-')[0];
          const targetVoice = voices.find(v => v.lang.replace('_', '-').startsWith(langPrefix));
          if (targetVoice) utterance.voice = targetVoice;

          addSystemLog(`🔊 Playing Web Speech API (${reason}): Voice='${targetVoice ? targetVoice.name : 'default'}'`);
          setPlayingId(id);
          utterance.onend = () => { addSystemLog(`⏹️ Web Speech API Play Ended`); setPlayingId(null); };
          utterance.onerror = (e) => { addSystemLog(`❌ Web Speech API Error: ${e.error}`); setPlayingId(null); };

          window.speechSynthesis.speak(utterance);
        };

        if (currentSelectedVoice === 'web-speech-api') {
          playBrowserNativeSpeech('Direct Option Select');
          return;
        }

        const cacheKey = `${id}_${currentSelectedVoice}`;
        let blobUrl = audioBlobCache.current[cacheKey];
        if (!blobUrl) {
          setLoadingId(id);
          addSystemLog(`🌐 Fetching Google Cloud TTS: API='${BACKEND_URL}/api/tts' | VoiceParam='${currentSelectedVoice}'`);
          try {
            const res = await fetch(`${BACKEND_URL}/api/tts`, {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({
                text: cleanAudioText,
                language: langCode,
                voice: currentSelectedVoice,
                apiKey: geminiApiKey
              })
            });

            const contentType = res.headers.get('content-type') || '';
            const ttsStep = res.headers.get('x-tts-step') || 'unknown';
            const ttsVoice = res.headers.get('x-tts-voice') || 'unknown';

            addSystemLog(`📡 Server Response: Status=${res.status} | ContentType='${contentType}' | X-TTS-Step='${ttsStep}' | X-TTS-Voice='${ttsVoice}'`);

            if (!res.ok || contentType.includes('application/json')) {
              const errData = await res.json().catch(() => ({}));
              setLoadingId(null);
              addSystemLog(`⚠️ Server TTS Failed/Fallback Signal: Status=${res.status} -> Web Speech API Fallback`);
              playBrowserNativeSpeech(`Server Fallback ${res.status}`);
              return;
            }

            const blob = await res.blob();
            blobUrl = URL.createObjectURL(blob);
            audioBlobCache.current[cacheKey] = blobUrl;
            setLoadingId(null);
            addSystemLog(`✅ Google Cloud TTS Audio Blob Loaded: Size=${blob.size} bytes`);
          } catch (err) {
            setLoadingId(null);
            addSystemLog(`💥 Fetch Exception: '${err.message}' -> Web Speech API Fallback`);
            playBrowserNativeSpeech('Fetch Exception');
            return;
          }
        } else {
          addSystemLog(`⚡ Using Cached Audio Blob for Key: '${cacheKey}'`);
        }

        const audio = new Audio(blobUrl);
        activeAudioRef.current = audio;
        setPlayingId(id);

        audio.onended = () => { addSystemLog(`⏹️ MP3 Audio Play Ended`); setPlayingId(null); activeAudioRef.current = null; };
        audio.onerror = (err) => { addSystemLog(`❌ MP3 Audio Play Error`); setPlayingId(null); activeAudioRef.current = null; };

        audio.play().catch(e => {
          addSystemLog(`❌ MP3 Play Catch Error: '${e.message}' -> Web Speech Fallback`);
          setPlayingId(null);
          activeAudioRef.current = null;
          playBrowserNativeSpeech('Audio Play Error');
        });
      };

      const handleSubmitApiKey = (inputKey) => {
        const cleanKey = inputKey ? inputKey.trim() : '';
        const isInvalid = !cleanKey || cleanKey.toLowerCase() === 'skip';

        if (isInvalid) {
          const warnMsg = {
            id: 'warn-key-' + Date.now(),
            sender: 'ai',
            isError: true,
            lang: 'bilingual',
            text: `⚠️ Vui lòng nhập Google Gemini API Key để tiếp tục.\n⚠️ 継続するには Google Gemini APIキーを入力してください。（※APIキーの入力は必須です）`,
            time: new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' })
          };
          setChatMessages(prev => [...prev, warnMsg]);
          scrollToBottom();
          focusTextInput();
          return;
        }

        setGeminiApiKey(cleanKey);
        setOnboardingStep('ui_lang');

        const userMsg = {
          id: 'user-key-' + Date.now(),
          sender: 'user',
          text: `🔑 [API Key]: ${cleanKey.slice(0, 6)}...`,
          time: new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' })
        };

        const aiStep1 = {
          id: 'step1-prompt-' + Date.now(),
          sender: 'ai',
          lang: 'trilingual',
          type: 'onboarding_ui',
          text: `🇻🇳 Chào bạn! Vui lòng chọn ngôn ngữ giao diện bạn muốn sử dụng:\n🇯🇵 次に、アプリの案内で使用する【使用言語】を選択してください：\n🇺🇸 Next, please select the language for the app interface:`,
          time: new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' })
        };

        setChatMessages(prev => [...prev, userMsg, aiStep1]);
        scrollToBottom();
        focusTextInput();
      };

      const handleSelectUiLang = (selectedCode) => {
        setUiLang(selectedCode);
        setOnboardingStep('target_lang');

        const step2MsgMap = {
          'vi-VN': 'Đã chọn ngôn ngữ giao diện là [Tiếng Việt]. Tiếp theo, vui lòng chọn [Ngôn ngữ mục tiêu] mà bạn muốn luyện tập:',
          'ja-JP': '使用言語を【日本語】に設定しました。次に、会話練習で学習したい【目標言語】を選択してください：',
          'en-US': 'Interface language set to [English]. Next, please select your [Target Learning Language] to practice:'
        };

        const userMsg = {
          id: 'user-select-ui-' + Date.now(),
          sender: 'user',
          text: `[Giao diện / UI Language]: ${LANG_META[selectedCode].flag} ${LANG_META[selectedCode].name}`,
          time: new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' })
        };

        const aiStep2 = {
          id: 'step2-prompt-' + Date.now(),
          sender: 'ai',
          lang: selectedCode,
          type: 'onboarding_target',
          text: step2MsgMap[selectedCode] || step2MsgMap['vi-VN'],
          time: new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' })
        };

        setChatMessages(prev => [...prev, userMsg, aiStep2]);
      };

      const handleSelectTargetLang = async (selectedCode) => {
        setTargetLang(selectedCode);
        setOnboardingStep('completed');

        const userMsg = {
          id: 'user-select-target-' + Date.now(),
          sender: 'user',
          text: `[Học tập / Target Language]: ${LANG_META[selectedCode].flag} ${LANG_META[selectedCode].name}`,
          time: new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' })
        };

        const aiCompletedMsg = {
          id: 'ai-completed-' + Date.now(),
          sender: 'ai',
          lang: selectedCode,
          text: selectedCode === 'ja-JP'
            ? `素晴（すば）らしいですね！目標言語（もくひょうげんご）を【日本語（にほんご）】に設定（せってい）しました。今日（きょう）はどのような場面（ばめん）やシチュエーションで会話練習（かいわれんしゅう）をしたいですか？（例: 空港（くうこう）での荷物（にもつ）預（あず）け、レストランでの注文（ちゅうもん）など）`
            : selectedCode === 'vi-VN'
            ? `Tuyệt vời! Đã thiết lập ngôn ngữ mục tiêu là [Tiếng Việt]. Hôm nay bạn muốn luyện tập giao tiếp trong tình huống nào? (Ví dụ: Gửi hành lý ở sân bay, gọi món ở nhà hàng...)`
            : `Awesome! Target language set to [English]. What scenario would you like to practice today? (e.g. Checking bags at the airport, ordering food at a restaurant)`,
          time: new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' })
        };

        setChatMessages(prev => [...prev, userMsg, aiCompletedMsg]);
        scrollToBottom();
        focusTextInput();
      };

      const handleSendMessage = async (customText = null) => {
        const textToSend = customText || inputMessage;
        if (!textToSend.trim()) return;

        if (onboardingStep === 'api_key') {
          setInputMessage('');
          handleSubmitApiKey(textToSend);
          return;
        }

        const userMsg = {
          id: 'user-' + Date.now(),
          sender: 'user',
          text: textToSend,
          time: new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' })
        };

        setChatMessages(prev => [...prev, userMsg]);
        if (!customText) setInputMessage('');
        setIsThinking(true);
        scrollToBottom();

        const contextAdvice = generateContextAdvice(textToSend, uiLang, targetLang);

        try {
          const res = await fetch(`${BACKEND_URL}/api/chat`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
              message: textToSend,
              history: chatMessages,
              uiLang: uiLang,
              targetLang: targetLang,
              apiKey: geminiApiKey
            })
          });

          const data = await res.json();
          setIsThinking(false);

          if (!res.ok || data.error) {
            const errReply = {
              id: 'ai-err-' + Date.now(),
              sender: 'ai',
              isError: true,
              text: `⚠️ Lỗi kết nối Gemini API: ${data.error || 'Unknown error'}\nChi tiết: ${data.log || ''}`,
              time: new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' })
            };
            setChatMessages(prev => [...prev, errReply]);
            scrollToBottom();
            return;
          }

          if (data.model) setActiveConnectedModel(data.model);

          const aiReply = {
            id: 'ai-' + Date.now(),
            sender: 'ai',
            modelName: data.model,
            text: data.reply,
            time: new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' }),
            advice: contextAdvice
          };

          setChatMessages(prev => [...prev, aiReply]);
          scrollToBottom();
          focusTextInput();

          // Auto-play speech for AI reply
          playEdgeTts(aiReply.id, data.reply, targetLang);

        } catch (err) {
          setIsThinking(false);
          const catchErr = {
            id: 'ai-catch-' + Date.now(),
            sender: 'ai',
            isError: true,
            text: `💥 Error: ${err.message}`,
            time: new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' })
          };
          setChatMessages(prev => [...prev, catchErr]);
          scrollToBottom();
          focusTextInput();
        }
      };

      const handleResetChat = () => {
        setOnboardingStep('api_key');
        setGeminiApiKey('');
        setChatMessages([
          {
            id: 'welcome-api-key-' + Date.now(),
            sender: 'ai',
            lang: 'bilingual',
            type: 'onboarding_api_key',
            text: `🔑 Google Gemini API Key Setup / Cấu hình Google Gemini API Key:\n\n🇻🇳 Chào bạn! Vui lòng nhập Google Gemini API Key (ví dụ: AIzaSy...) vào khung chat bên dưới để bắt đầu (Bắt buộc):\n🇯🇵 こんにちは！ご使用前に Google Gemini APIキー（例: AIzaSy...）を下のチャット入力欄に入力してください:`,
            time: new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' })
          }

        scrollToBottom();
        focusTextInput();
      };

            <div class="brand-section-compact">
              <div

                🤖

              <div>

                <div class="brand-subtitle-sm">{dict.subtitle}</div>

            </div>

            {/* TAB BUTTONS WITH STYLISH SHADOW & ACTIVE SINKING EFFECT */}
            <nav class="nav-tabs-compact" style={{ display: 'flex', gap: '8px', background: 'rgba(0, 0, 0, 0.04)', padding: '4px', borderRadius: '12px' }}>
              <button
                class={`nav-tab-sm ${activeTab === 'chat' ? 'active' : ''}`}

                  padding: '8px 16px',
                  borderRadius: '8px',
                  border: 'none',
                  fontWeight: '700',
                  fontSize: '0.9rem',
                  cursor: 'pointer',
                  transition: 'all 0.15s ease-in-out',
                  boxShadow: activeTab === 'chat'
                    ? '0 4px 10px rgba(224, 122, 95, 0.3), inset 0 1px 0 rgba(255, 255, 255, 0.4)'

                  background: activeTab === 'chat'
                    ? 'linear-gradient(135deg, var(--accent-terracotta) 0%, var(--accent-terracotta-dark) 100%)'
                    : '#ffffff',
                  color: activeTab === 'chat' ? '#ffffff' : 'var(--text-main)',
                  transform: activeTab === 'chat' ? 'translateY(1px)' : 'none'
                }}
                onClick={() => setActiveTab('chat')}
              >
                {dict.chatTab}
              </button>
              <button
                class={`nav-tab-sm ${activeTab === 'shadowing' ? 'active' : ''}`}
                style={{
                  padding: '8px 16px',
                  borderRadius: '8px',
                  border: 'none',
                  fontWeight: '700',
                  fontSize: '0.9rem',
                  cursor: 'pointer',
                  transition: 'all 0.15s ease-in-out',
                  boxShadow: activeTab === 'shadowing'
                    ? '0 4px 10px rgba(224, 122, 95, 0.3), inset 0 1px 0 rgba(255, 255, 255, 0.4)'
                    : '0 2px 5px rgba(0, 0, 0, 0.08)',
                  background: activeTab === 'shadowing'
                    ? 'linear-gradient(135deg, var(--accent-terracotta) 0%, var(--accent-terracotta-dark) 100%)'
                    : '#ffffff',
                  color: activeTab === 'shadowing' ? '#ffffff' : 'var(--text-main)',
                  transform: activeTab === 'shadowing' ? 'translateY(1px)' : 'none'
                }}
                onClick={() => setActiveTab('shadowing')}
              >
                {dict.shadowingTab}
              </button>
            </nav>

            <div class="header-controls-sm">
              <span class="badge-sm badge-edge">
                {dict.uiLangLabel}: 🇻🇳 Tiếng Việt
              </span>
              <span class="badge-sm badge-sage">
                {dict.targetLangLabel}: {targetLang === 'vi-VN' ? '🇻🇳 Tiếng Việt' : targetLang === 'ja-JP' ? '🇯🇵 日本語' : '🇺🇸 English'}
              </span>
              {activeConnectedModel && (
                <span class="badge-sm badge-sage" style={{ background: 'var(--accent-terracotta)', color: 'white' }}>
                  🤖 {activeConnectedModel}
                </span>
              )}
              <select
                class="select-tts-model-sm"
                value={currentSelectedVoice}
                onChange={handleVoiceChange}
                title="Chọn giọng đọc TTS / Speech Voice Model"
              >
                <option value="journey">🎙️ Journey (会話自然声)</option>
                <option value="neural2-female">🎙️ Neural2 (女性/自然高音質)</option>
                <option value="neural2-male">🎙️ Neural2 (男性/自然高音質)</option>
                <option value="wavenet">🎙️ WaveNet (高品質)</option>
                <option value="web-speech-api">🔊 Web Speech API (Trình duyệt)</option>
              </select>
              <button
                class="btn-end-lesson-sm"
                style={{ background: 'linear-gradient(135deg, #f4a261 0%, #e07a5f 100%)' }}
                onClick={handleResetChat}
                title="Đặt lại trò chuyện / Reset Chat"
              >
                🔄 {dict.resetChat}
              </button>
              <button
                class="btn-end-lesson-sm"
                onClick={() => alert('Đã tạo báo cáo PDF luyện tập thành công!')}
              >
                {dict.endLesson}
              </button>
            </div>
          </header>

          {/* MODE 1: MAIN CONVERSATION PRACTICE SCREEN */}
          {activeTab === 'chat' && (
            <div class="glass-panel chat-container" style={{ display: 'flex', flexDirection: 'column', height: 'calc(100vh - 120px)', minHeight: '520px' }}>
              <div class="chat-messages" ref={chatMessagesRef} style={{ flex: 1, overflowY: 'auto', padding: '16px' }}>
                {chatMessages.map(msg => {
                  const isPlaying = playingId === msg.id;
                  const isLoading = loadingId === msg.id;
                  return (
                    <div key={msg.id} class={`chat-bubble ${msg.sender} ${msg.isError ? 'error-bubble' : ''}`}>
                      <div style={{ whiteSpace: 'pre-line' }}><FuriganaText text={msg.text} /></div>
                      <div class="chat-bubble-meta">
                        <span>{msg.sender === 'ai' ? `🤖 LingoBot ${msg.modelName ? `(${msg.modelName})` : ''}` : `👤 User`}</span>
                        <span>{msg.time}</span>
                      </div>

                      {/* Onboarding UI language selection chips */}
                      {msg.type === 'onboarding_ui' && onboardingStep === 'ui_lang' && (
                        <div style={{ marginTop: '14px', display: 'flex', gap: '10px', flexWrap: 'wrap' }}>

                          <button class="btn btn-terracotta" onClick={() => handleSelectUiLang('ja-JP')}>

                          </button>

                      {/* Onboarding Target language selection chips */}
                      {msg.type === 'onboarding_target' && onboardingStep === 'target_lang' && (
                        <div style={{ marginTop: '14px', display: 'flex', gap: '10px', flexWrap: 'wrap' }}>
                          <button class="btn btn-terracotta" onClick={() => handleSelectTargetLang('ja-JP')}>
                            <FuriganaText text="🇯🇵 日本語（にほんご）" />
                          </button>
                          <button class="btn btn-terracotta" onClick={() => handleSelectTargetLang('vi-VN')}>
                            🇻🇳 Tiếng Việt
                          </button>
                          <button class="btn btn-terracotta" onClick={() => handleSelectTargetLang('en-US')}>
                            🇺🇸 English
                          </button>
                        </div>
                      )}

                      {/* Advice Card */}
                      {msg.advice && (
                        <div class="advice-card-embedded" style={{ marginTop: '12px' }}>

                            <div style={{ marginTop: '6px' }}>
                              {msg.advice.betterList.map((bText, idx) => (

                                  <FuriganaText text={bText} />
                                </div>
                              ))}
                            </div>
                          )}
                          <div class="advice-explanation"><FuriganaText text={msg.advice.explanation} /></div>

                      )}

                      {/* Audio Controls */}
                      {msg.sender === 'ai' && !msg.isError && msg.type !== 'onboarding_api_key' && (
                        <div class="chat-audio-controls">
                          <button
                            class={`btn-play-sm ${isPlaying ? 'playing' : ''}`}
                            onClick={() => playEdgeTts(msg.id, msg.text, targetLang)}

                            {isLoading ? '⏳ Đang tải...' : isPlaying ? '⏹️ Dừng' : '🔊 Phát âm'}
                          </button>
                        </div>
                      )}
                    </div>
                  );
                })}
                {isThinking && (
                  <div class="chat-bubble ai thinking-bubble">
                    <span>🤔 {dict.thinking}</span>
                  </div>
                )}
                <div ref={messagesEndRef} />
              </div>

              {/* ORIGINAL CHAT INPUT FOOTER */}
              <div
                class="chat-input-area"
                style={{
                  display: 'flex',
                  alignItems: 'center',
                  gap: '12px',
                  padding: '12px 18px',

                }}
              >
                <button
                  type="button"
                  class={`btn-mic-action ${isRecording ? 'recording' : ''}`}
                  onClick={toggleSpeechRecognition}
                  style={{
                    background: isRecording ? '#e76f51' : 'var(--bg-card)',
                    color: isRecording ? '#ffffff' : 'var(--accent-terracotta)',
                    border: '1.5px solid var(--accent-terracotta)',
                    borderRadius: '50%',
                    width: '44px',
                    height: '44px',
                    display: 'flex',

                    justifyContent: 'center',

                    cursor: 'pointer',

                  }}
                  title={isRecording ? 'Dừng ghi âm' : 'Nói bằng giọng nói'}
                >
                  {isRecording ? '⏹️' : '🎙️'}
                </button>

                <input
                  ref={textInputRef}
                  type="text"
                  class="chat-input"
                  style={{
                    flex: 1,
                    height: '44px',
                    padding: '0 16px',
                    borderRadius: '22px',
                    border: '1.5px solid #e0e0e0',
                    fontSize: '0.95rem',
                    outline: 'none',
                    background: '#ffffff'
                  }}
                  placeholder={dict.placeholder}
                  value={inputMessage}
                  onChange={(e) => setInputMessage(e.target.value)}
                  onKeyDown={(e) => {

                      handleSendMessage();

                  }}
                />

                  style={{
                    background: 'linear-gradient(135deg, var(--accent-terracotta) 0%, var(--accent-terracotta-dark) 100%)',
                    color: '#ffffff',
                    border: 'none',
                    borderRadius: '22px',
                    padding: '0 20px',
                    height: '44px',
                    display: 'flex',
                    alignItems: 'center',
                    gap: '6px',
                    fontWeight: '700',
                    cursor: 'pointer',
                    flexShrink: 0
                  }}
                >
                  <span>Gửi</span>
                  <span>➔</span>
                </button>
              </div>
            </div>
          )}

          {/* MODE 2: RESTORED FULL SHADOWING PRACTICE SCREEN */}
          {activeTab === 'shadowing' && (
            <div class="glass-panel shadowing-practice-container" style={{ padding: '24px', height: 'calc(100vh - 120px)', overflowY: 'auto' }}>
              <div style={{ marginBottom: '20px' }}>
                <h2 style={{ margin: 0, color: 'var(--accent-terracotta-dark)', fontSize: '1.4rem' }}>
                  🎙️ Luyện phát âm & Shadowing (シャドーイング練習)
                </h2>
                <p style={{ margin: '4px 0 0 0', color: 'var(--text-muted)', fontSize: '0.9rem' }}>
                  Nghe câu mẫu chuẩn và bấm Mic để thu âm đánh giá phát âm của bạn.
                </p>
              </div>

              {/* Category Filter Selector */}
              <div style={{ display: 'flex', gap: '8px', marginBottom: '20px', flexWrap: 'wrap' }}>
                <button
                  class={`btn-filter-sm ${selectedCategory === 'all' ? 'active' : ''}`}
                  onClick={() => { setSelectedCategory('all'); setCurrentSentenceIdx(0); }}
                >
                  Tất cả / 全て
                </button>
                <button
                  class={`btn-filter-sm ${selectedCategory === 'ja-beginner' ? 'active' : ''}`}
                  onClick={() => { setSelectedCategory('ja-beginner'); setCurrentSentenceIdx(0); }}
                >
                  🌱 初級 (Sơ cấp)

                <button
                  class={`btn-filter-sm ${selectedCategory === 'ja-intermediate' ? 'active' : ''}`}
                  onClick={() => { setSelectedCategory('ja-intermediate'); setCurrentSentenceIdx(0); }}

                <button

                  🌳 上級 (Cao cấp)
                </button>
              </div>

              {/* Current Sentence Card */}
              {currentSentence && (
                <div class="glass-card shadowing-card-main" style={{ background: '#ffffff', padding: '24px', borderRadius: '16px', border: '1px solid #eae0d5', boxShadow: '0 4px 20px rgba(0,0,0,0.04)' }}>
                  <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: '16px' }}>

                      Câu {currentSentenceIdx + 1} / {filteredSentences.length}
                    </span>
                  </div>

                  <div style={{ fontSize: '1.4rem', fontWeight: '800', color: 'var(--text-main)', marginBottom: '12px', lineHeight: '1.6' }}>
                    <FuriganaText text={currentSentence.text} />
                  </div>

                  <div style={{ fontSize: '0.95rem', color: 'var(--text-muted)', marginBottom: '16px', fontStyle: 'italic' }}>
                    {currentSentence.translation}
                  </div>

                  {/* Audio Listen Button */}
                  <div style={{ display: 'flex', gap: '12px', alignItems: 'center', marginBottom: '24px' }}>
                    <button
                      class="btn btn-terracotta"
                      style={{ padding: '10px 20px', fontSize: '0.95rem' }}
                      onClick={() => playEdgeTts(`shadowing-${currentSentence.id}`, currentSentence.text, currentSentence.lang)}
                    >
                      {playingId === `shadowing-${currentSentence.id}` ? '⏹️ Dừng nghe' : '🔊 Nghe câu mẫu (Listen Standard)'}
                    </button>
                  </div>

                  {/* Mic Record Area */}
                  <div style={{ textAlign: 'center', padding: '20px', background: '#fdfbf7', borderRadius: '12px', border: '1px dashed #e4d5c3' }}>
                    <button
                      class={`btn-record-large ${isRecording ? 'recording' : ''}`}
                      onClick={toggleShadowingMic}
                      style={{
                        width: '72px',
                        height: '72px',
                        borderRadius: '50%',
                        border: 'none',
                        background: isRecording ? '#e76f51' : 'linear-gradient(135deg, var(--accent-terracotta) 0%, var(--accent-terracotta-dark) 100%)',
                        color: '#ffffff',
                        fontSize: '2rem',
                        cursor: 'pointer',
                        boxShadow: '0 6px 20px rgba(224, 122, 95, 0.4)',
                        transition: 'all 0.2s ease'
                      }}
                    >
                      {isRecording ? '⏹️' : '🎙️'}
                    </button>
                    <div style={{ marginTop: '12px', fontWeight: '700', color: isRecording ? '#e76f51' : 'var(--text-main)' }}>
                      {isRecording ? '🔴 Đang ghi âm... Hãy đọc theo câu mẫu!' : 'Bấm nút Mic để bắt đầu đọc và thu âm (Shadowing)'}
                    </div>
                    {userVoiceInput && (
                      <div style={{ marginTop: '10px', fontSize: '1rem', color: 'var(--accent-terracotta-dark)', fontStyle: 'italic' }}>
                        "{userVoiceInput}"
                      </div>
                    )}
                  </div>

                  {/* Evaluation Result Card */}
                  {shadowingEval && (
                    <div style={{ marginTop: '24px', padding: '18px', background: '#f4f9f4', border: '1px solid #c8e6c9', borderRadius: '12px' }}>
                      <div style={{ display: 'flex', alignItems: 'center', gap: '12px', marginBottom: '8px' }}>
                        <span style={{ fontSize: '2rem', fontWeight: '900', color: shadowingEval.score >= 80 ? '#2e7d32' : '#ed6c02' }}>
                          {shadowingEval.score} điểm
                        </span>
                        <div>
                          <div style={{ fontWeight: '700', color: '#1b5e20' }}>{shadowingEval.feedbackVi}</div>
                          <div style={{ fontSize: '0.85rem', color: '#388e3c' }}>{shadowingEval.feedbackJa}</div>
                        </div>
                      </div>
                      {currentSentence.advice && (
                        <div style={{ marginTop: '10px', fontSize: '0.88rem', color: '#2e7d32', background: '#ffffff', padding: '10px', borderRadius: '8px' }}>
                          {currentSentence.advice.mouthTip}
                        </div>
                      )}
                    </div>
                  )}

                  {/* Pagination Controls */}
                  <div style={{ display: 'flex', justifyContent: 'space-between', marginTop: '24px' }}>
                    <button
                      class="btn btn-secondary"
                      disabled={currentSentenceIdx === 0}
                      onClick={() => { setCurrentSentenceIdx(prev => Math.max(0, prev - 1)); setShadowingEval(null); setUserVoiceInput(''); }}
                    >
                      ⬅️ Câu trước (Previous)
                    </button>
                    <button
                      class="btn btn-terracotta"
                      disabled={currentSentenceIdx >= filteredSentences.length - 1}
                      onClick={() => { setCurrentSentenceIdx(prev => Math.min(filteredSentences.length - 1, prev + 1)); setShadowingEval(null); setUserVoiceInput(''); }}
                    >
                      Câu tiếp theo (Next) ➡️
                    </button>
                  </div>
                </div>
              )}
            </div>
          )}

          {/* SYSTEM DIAGNOSTIC LOGS MODAL */}
          {showLogModal && (
            <div class="modal-overlay" onClick={() => setShowLogModal(false)}>
              <div class="modal-card glass-panel" style={{ maxWidth: '680px', width: '92%' }} onClick={e => e.stopPropagation()}>
                <div class="modal-header">
                  <div style={{ display: 'flex', alignItems: 'center', gap: '10px' }}>
                    <span style={{ fontSize: '1.6rem' }}>🤖</span>
                    <div>
                      <h3 style={{ margin: 0, fontSize: '1.1rem', color: 'var(--accent-terracotta-dark)' }}>
                        📜 Nhật ký chẩn đoán TTS (Diagnostic Logs)
                      </h3>
                      <p style={{ margin: 0, fontSize: '0.8rem', color: 'var(--text-muted)' }}>
                        Lịch sử gọi API, tạo âm thanh và chuyển đổi mô hình
                      </p>
                    </div>
                  </div>
                  <button class="btn-close-sm" onClick={() => setShowLogModal(false)}>✕</button>
                </div>

                <div class="modal-body" style={{ padding: '16px 0' }}>
                  <div
                    style={{
                      background: '#1e1e2e',
                      color: '#a6adc8',
                      fontFamily: 'Consolas, Monaco, monospace',
                      fontSize: '0.82rem',
                      padding: '14px',
                      borderRadius: '8px',
                      maxHeight: '340px',
                      overflowY: 'auto',
                      whiteSpace: 'pre-wrap',
                      lineHeight: '1.5',
                      border: '1px solid #313244'
                    }}
                  >
                    {systemLogs.length === 0 ? (
                      <div style={{ color: '#6c7086', textAlign: 'center' }}>Không có tin nhắn nhật ký nào.</div>
                    ) : (
                      systemLogs.map((log, idx) => (
                        <div key={idx} style={{ color: log.includes('Error') || log.includes('Failed') || log.includes('❌') ? '#f38ba8' : log.includes('Success') || log.includes('▶️') || log.includes('✅') ? '#a6e3a1' : '#cdd6f4', marginBottom: '2px' }}>
                          {log}
                        </div>
                      ))
                    )}
                  </div>
                </div>

                <div class="modal-footer" style={{ display: 'flex', justifyContent: 'space-between', gap: '10px' }}>
                  <div style={{ display: 'flex', gap: '8px' }}>
                    <button
                      class="btn btn-secondary"
                      style={{ fontSize: '0.82rem', padding: '6px 12px' }}
                      onClick={() => setSystemLogs([`[${new Date().toLocaleTimeString()}] Log cleared.`])}
                    >
                      🗑️ Xóa log
                    </button>
                    <button
                      class="btn btn-terracotta"
                      style={{ fontSize: '0.82rem', padding: '6px 14px' }}
                      onClick={() => downloadTextFile(`lingobot_diagnostic_log_${Date.now()}.txt`, systemLogs.join(String.fromCharCode(10)))}
                    >
                      📥 Tải log (.txt)
                    </button>
                  </div>
                  <button class="btn btn-secondary" onClick={() => setShowLogModal(false)}>
                    Đóng
                  </button>
                </div>
              </div>
            </div>
          )}
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
