<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LingoBotWebApp</title>

  <!-- Stylesheets (Soft Warm Beige Theme) -->
  <link rel="stylesheet" href="styles/main.css" />
  <link rel="stylesheet" href="styles/components.css" />

  <!-- React & Babel Standalone CDN -->
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <!-- html2pdf.js for Lesson Summary PDF Export -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    const VOICE_CONFIG = {
      'en-US': { name: 'Aria (US English)', flag: '🇺🇸', label: 'US English' },
      'ja-JP': { name: 'Nanami (日本語)', flag: '🇯🇵', label: 'Japanese' },
      'vi-VN': { name: 'Hoài Mỹ (Tiếng Việt)', flag: '🇻🇳', label: 'Vietnamese' }
    };

    const SAMPLE_SENTENCES = [
      {
        id: 1,
        category: 'en-business',
        lang: 'en-US',
        text: "We need to optimize our workflow to deliver the project on schedule.",
        phonetic: "wiː niːd tuː ˈɒptɪmaɪz ˈaʊə ˈwɜːkfləʊ tuː dɪˈlɪvə ðə ˈprɒdʒɛkt ɒn ˈʃɛdjuːl",
        translation: "Chúng ta cần tối ưu hóa quy trình làm việc để bàn giao dự án đúng tiến độ.",
        difficulty: "Trung cấp / Intermediate"
      },
      {
        id: 2,
        category: 'en-daily',
        lang: 'en-US',
        text: "Could you please tell me where the nearest coffee shop is located?",
        phonetic: "kʊd juː pliːz tɛl miː weə ðə ˈnɪərɪst ˈkɒfi ʃɒp ɪz ləʊˈkeɪtɪd",
        translation: "Bạn có thể chỉ giúp tôi quán cà phê gần nhất ở đâu không?",
        difficulty: "Sơ cấp / Beginner"
      },
      {
        id: 3,
        category: 'ja-daily',
        lang: 'ja-JP',
        text: "ネイティブの音声ボイスを活用して、自然なスピーキング会話練習を行いましょう。",
        phonetic: "ねぃてぃぶ の おんせい を かつようして、しぜんな すぴーきんぐ かいわ れんしゅう を おこないましょう。",
        translation: "Hãy luyện tập nói tự nhiên bằng giọng đọc AI chuẩn native.",
        difficulty: "Trung cấp / Intermediate"
      },
      {
        id: 4,
        category: 'vi-daily',
        lang: 'vi-VN',
        text: "Chào mừng bạn đến với LingoBotWebApp! Hãy bắt đầu luyện tập hội thoại ngay hôm nay.",
        phonetic: "Chao mung ban den voi LingoBotWebApp! Hay bat dau luyen tap hoi thoai ngay hom nay.",
        translation: "Welcome to LingoBotWebApp! Start practicing conversation today.",
        difficulty: "Trung cấp / Intermediate"
      }
    ];

    // Word Pronunciation Levenshtein Diff Calculator
    function evaluatePronunciation(targetText, recognizedText) {
      const norm = str => str.toLowerCase().replace(/[.,/#!$%^&*;:{}=\-_`~()?'"“”]/g, '').replace(/\s+/g, ' ').trim();
      const tWords = norm(targetText).split(' ').filter(Boolean);
      const rWords = norm(recognizedText).split(' ').filter(Boolean);

      if (tWords.length === 0) return { score: 100, diff: [] };

      const n = tWords.length, m = rWords.length;
      const dp = Array.from({ length: n + 1 }, () => Array(m + 1).fill(0));
      for (let i = 0; i <= n; i++) dp[i][0] = i;
      for (let j = 0; j <= m; j++) dp[0][j] = j;

      for (let i = 1; i <= n; i++) {
        for (let j = 1; j <= m; j++) {
          if (tWords[i - 1] === rWords[j - 1]) dp[i][j] = dp[i - 1][j - 1];
          else dp[i][j] = Math.min(dp[i - 1][j] + 1, dp[i][j - 1] + 1, dp[i - 1][j - 1] + 1);
        }
      }

      let i = n, j = m, diff = [], correctCount = 0;
      while (i > 0 || j > 0) {
        if (i > 0 && j > 0 && tWords[i - 1] === rWords[j - 1]) {
          diff.unshift({ type: 'correct', word: tWords[i - 1] });
          correctCount++; i--; j--;
        } else if (i > 0 && j > 0 && dp[i][j] === dp[i - 1][j - 1] + 1) {
          diff.unshift({ type: 'missing', word: tWords[i - 1], said: rWords[j - 1] });
          i--; j--;
        } else if (i > 0 && dp[i][j] === dp[i - 1][j] + 1) {
          diff.unshift({ type: 'missing', word: tWords[i - 1] });
          i--;
        } else {
          diff.unshift({ type: 'extra', word: rWords[j - 1] });
          j--;
        }
      }

      const score = Math.max(0, Math.round((correctCount / tWords.length) * 100));
      let grade = 'Cần luyện tập / Needs Practice', gradeColor = '#e63946';
      if (score >= 90) { grade = 'Xuất sắc / Excellent'; gradeColor = '#2a9d8f'; }
      else if (score >= 75) { grade = 'Rất tốt / Very Good'; gradeColor = '#e07a5f'; }
      else if (score >= 50) { grade = 'Khá tốt / Good Attempt'; gradeColor = '#f4a261'; }

      return { score, grade, gradeColor, diff };
    }

    // MAIN LINGOBOT WEB APP
    function App() {
      // Main screen default is 'chat' for conversation practice
      const [activeTab, setActiveTab] = useState('chat'); // 'chat' | 'shadowing'
      const [currentSentenceIdx, setCurrentSentenceIdx] = useState(0);
      const [isRecording, setIsRecording] = useState(false);
      const [liveTranscript, setLiveTranscript] = useState('');
      const [evalResult, setEvalResult] = useState(null);
      const [playingId, setPlayingId] = useState(null);
      const [loadingId, setLoadingId] = useState(null);
      const [showPdfModal, setShowPdfModal] = useState(false);

      // Edge TTS Audio Cache
      const audioBlobCache = useRef({});
      const activeAudioRef = useRef(null);
      const recognitionRef = useRef(null);

      // AI Chat Messages State
      const [chatMessages, setChatMessages] = useState([
        {
          id: 'chat-init',
          sender: 'ai',
          lang: 'vi-VN',
          text: 'Xin chào! Tôi là LingoBotWebApp. Bạn muốn cùng tôi luyện tập hội thoại tự học bằng tiếng Anh, tiếng Nhật hay tiếng Việt hôm nay?',
          time: new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' })
        }
      ]);

      const currentSentence = SAMPLE_SENTENCES[currentSentenceIdx];

      // Edge TTS Player
      const playEdgeTts = async (id, text, language) => {
        if (playingId === id) {
          if (activeAudioRef.current) activeAudioRef.current.pause();
          setPlayingId(null);
          return;
        }

        if (activeAudioRef.current) activeAudioRef.current.pause();

        let blobUrl = audioBlobCache.current[id];
        if (!blobUrl) {
          setLoadingId(id);
          try {
            const res = await fetch('/api/tts', {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({ text, language })
            });
            if (!res.ok) throw new Error(`HTTP ${res.status}`);
            const blob = await res.blob();
            blobUrl = URL.createObjectURL(blob);
            audioBlobCache.current[id] = blobUrl;
            setLoadingId(null);
          } catch (err) {
            setLoadingId(null);
            alert(`Lỗi phát âm thanh: ${err.message}`);
            return;
          }
        }

        const audio = new Audio(blobUrl);
        activeAudioRef.current = audio;
        setPlayingId(id);

        audio.onended = () => { setPlayingId(null); activeAudioRef.current = null; };
        audio.onerror = () => { setPlayingId(null); activeAudioRef.current = null; };

        audio.play().catch(e => setPlayingId(null));
      };

      // Download MP3
      const downloadMp3 = async (id, text, language, filename = 'lingobot_voice.mp3') => {
        let blobUrl = audioBlobCache.current[id];
        if (!blobUrl) {
          setLoadingId(id);
          try {
            const res = await fetch('/api/tts', {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({ text, language })
            });
            if (!res.ok) throw new Error(`HTTP ${res.status}`);
            const blob = await res.blob();
            blobUrl = URL.createObjectURL(blob);
            audioBlobCache.current[id] = blobUrl;
            setLoadingId(null);
          } catch (err) {
            setLoadingId(null);
            alert(`Lỗi tải xuống: ${err.message}`);
            return;
          }
        }

        const a = document.createElement('a');
        a.href = blobUrl;
        a.download = filename;
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
      };

      // Speech STT Toggle
      const toggleRecording = (targetLang, onFinalText) => {
        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        if (!SpeechRecognition) {
          alert('Trình duyệt không hỗ trợ Web Speech API. Vui lòng dùng Chrome hoặc Edge.');
          return;
        }

        if (isRecording) {
          if (recognitionRef.current) recognitionRef.current.stop();
          setIsRecording(false);
          return;
        }

        const rec = new SpeechRecognition();
        recognitionRef.current = rec;
        rec.lang = targetLang;
        rec.interimResults = true;
        rec.continuous = false;

        setLiveTranscript('');
        setEvalResult(null);

        rec.onstart = () => setIsRecording(true);

        rec.onresult = (e) => {
          let interim = '', final = '';
          for (let i = e.resultIndex; i < e.results.length; ++i) {
            if (e.results[i].isFinal) final += e.results[i][0].transcript;
            else interim += e.results[i][0].transcript;
          }
          if (interim) setLiveTranscript(interim);
          if (final) {
            setLiveTranscript(final);
            onFinalText(final.trim());
          }
        };

        rec.onerror = (e) => {
          setIsRecording(false);
          alert(`Lỗi micro: ${e.error}`);
        };

        rec.onend = () => setIsRecording(false);
        rec.start();
      };

      // AI Conversation Handler
      const handleUserChat = (userText) => {
        if (!userText.trim()) return;

        const userMsg = {
          id: 'user-' + Date.now(),
          sender: 'user',
          text: userText,
          time: new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' })
        };

        let aiReplyText = "";
        const lower = userText.toLowerCase();

        if (lower.includes('hello') || lower.includes('hi') || lower.includes('xin chào') || lower.includes('chào')) {
          aiReplyText = "Xin chào bạn! Tôi rất vui được đồng hành cùng bạn luyện tập hội thoại tự học hôm nay. Bạn muốn trao đổi chủ đề gì?";
        } else if (lower.includes('english') || lower.includes('tiếng anh')) {
          aiReplyText = "Great! Let's practice English together with natural native audio responses!";
        } else if (lower.includes('japanese') || lower.includes('tiếng nhật') || lower.includes('日本語')) {
          aiReplyText = "素晴らしいですね！日本語の会話練習を始めましょう。何か質問はありますか？";
        } else {
          aiReplyText = `Cảm ơn bạn đã chia sẻ! Việc chủ động nói chuyện và lắng nghe phản hồi phát âm chuẩn sẽ giúp bạn tiến bộ vô cùng nhanh chóng.`;
        }

        const aiMsg = {
          id: 'ai-' + Date.now(),
          sender: 'ai',
          lang: lower.includes('english') ? 'en-US' : lower.includes('japanese') || lower.includes('日本語') ? 'ja-JP' : 'vi-VN',
          text: aiReplyText,
          time: new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' })
        };

        setChatMessages(prev => [...prev, userMsg, aiMsg]);

        setTimeout(() => {
          playEdgeTts(aiMsg.id, aiMsg.text, aiMsg.lang);
        }, 350);
      };

      // Export Lesson Summary PDF
      const handleExportPdf = () => {
        const element = document.getElementById('pdf-report-element');
        if (!element) return;

        const opt = {
          margin:       0.4,
          filename:     `LingoBot_Lesson_Summary_${Date.now()}.pdf`,
          image:        { type: 'jpeg', quality: 0.98 },
          html2canvas:  { scale: 2, useCORS: true },
          jsPDF:        { unit: 'in', format: 'letter', orientation: 'portrait' }
        };

        html2pdf().set(opt).from(element).save();
      };

      return (
        <div class="app-container">
          {/* Header */}
          <header class="glass-panel app-header">
            <div class="brand-section">
              <div class="brand-logo">🤖</div>
              <div>
                <div class="brand-title">
                  LingoBotWebApp
                </div>
                <div class="brand-subtitle">
                  AIとの会話練習（自習用）：ネイティブの音声でリアルタイム返答
                </div>
              </div>
            </div>
            <div style={{ display: 'flex', gap: '10px', alignItems: 'center' }}>
              <span class="badge badge-sage" style={{ padding: '8px 14px' }}>
                🟢 Online (Port 5050)
              </span>
              {/* Kết thúc bài học / End Lesson Button */}
              <button
                class="btn btn-end-lesson"
                style={{ padding: '8px 16px', fontSize: '0.88rem' }}
                onClick={() => setShowPdfModal(true)}
              >
                🛑 Kết thúc bài học / End Lesson
              </button>
            </div>
          </header>

          {/* Navigation Tabs */}
          <div style={{ display: 'flex', justify: 'space-between', alignItems: 'center', flexWrap: 'wrap', gap: '12px' }}>
            <nav class="nav-tabs">
              <button
                class={`nav-tab ${activeTab === 'chat' ? 'active' : ''}`}
                onClick={() => setActiveTab('chat')}
              >
                💬 Trò chuyện AI (Hội thoại) / 相互会話
              </button>
              <button
                class={`nav-tab ${activeTab === 'shadowing' ? 'active' : ''}`}
                onClick={() => setActiveTab('shadowing')}
              >
                🎯 Luyện phát âm / 発音分析
              </button>
            </nav>
          </div>

          {/* MAIN CONVERSATION PRACTICE SCREEN (Default Screen) */}
          {activeTab === 'chat' && (
            <div class="glass-panel chat-container">
              <div class="chat-messages">
                {chatMessages.map(msg => {
                  const isPlaying = playingId === msg.id;
                  const isLoading = loadingId === msg.id;
                  return (
                    <div key={msg.id} class={`chat-bubble ${msg.sender}`}>
                      <div>{msg.text}</div>
                      <div class="chat-bubble-meta">
                        <span>{msg.sender === 'ai' ? '🤖 LingoBot AI' : '👤 Bạn / You (Web Speech STT)'}</span>
                        <span>{msg.time}</span>
                      </div>

                      {/* Required Action Buttons for AI Chat Responses */}
                      {msg.sender === 'ai' && (
                        <div class="chat-bubble-actions">
                          {/* 1. 「🔊 Phát âm thanh / Play Voice」 Button */}
                          <button
                            class={`btn btn-terracotta ${isPlaying ? 'playing' : ''}`}
                            style={{ padding: '6px 14px', fontSize: '0.82rem' }}
                            disabled={isLoading}
                            onClick={() => playEdgeTts(msg.id, msg.text, msg.lang || 'vi-VN')}
                          >
                            {isLoading ? (
                              <span>⏳ Đang tổng hợp...</span>
                            ) : isPlaying ? (
                              <span>⏹ Dừng / Stop</span>
                            ) : (
                              <span>🔊 Phát âm thanh / Play Voice</span>
                            )}
                          </button>

                          {/* 2. 「⬇️ Tải xuống MP3 / Download MP3」 Button */}
                          <button
                            class="btn btn-secondary"
                            style={{ padding: '6px 14px', fontSize: '0.82rem' }}
                            onClick={() => downloadMp3(msg.id, msg.text, msg.lang || 'vi-VN', `lingobot_chat_${msg.id}.mp3`)}
                          >
                            <span>⬇️ Tải xuống MP3 / Download MP3</span>
                          </button>
                        </div>
                      )}
                    </div>
                  );
                })}
              </div>

              {/* Chat Input & Finish Button Bar */}
              <div style={{ padding: '20px 24px', borderTop: '1px solid var(--border-warm)', background: 'rgba(255, 253, 249, 0.95)', display: 'flex', gap: '12px', alignItems: 'center' }}>
                <input
                  id="chat-text-input-field"
                  type="text"
                  class="form-input"
                  placeholder="Nhập tin nhắn hoặc nhấn micro để nói chuyện / Type message or talk via mic..."
                  onKeyDown={(e) => {
                    if (e.key === 'Enter') {
                      handleUserChat(e.target.value);
                      e.target.value = '';
                    }
                  }}
                />

                <button
                  class="btn btn-terracotta"
                  style={{ padding: '12px 18px', whiteSpace: 'nowrap' }}
                  onClick={() => {
                    const el = document.getElementById('chat-text-input-field');
                    if (el && el.value.trim()) {
                      handleUserChat(el.value);
                      el.value = '';
                    }
                  }}
                >
                  ✈️ Gửi / 送信
                </button>

                <button
                  class={`mic-button ${isRecording ? 'recording' : ''}`}
                  style={{ width: '50px', height: '50px', fontSize: '1.2rem' }}
                  title="Nói chuyện với AI / Speak to AI"
                  onClick={() => {
                    toggleRecording('vi-VN', (finalText) => {
                      handleUserChat(finalText);
                    });
                  }}
                >
                  {isRecording ? '🛑' : '🎙️'}
                </button>

                <button
                  class="btn btn-end-lesson"
                  style={{ padding: '12px 18px', fontSize: '0.9rem', whiteSpace: 'nowrap' }}
                  onClick={() => setShowPdfModal(true)}
                >
                  🛑 Kết thúc bài học
                </button>
              </div>
            </div>
          )}

          {/* SECONDARY SHADOWING MODE */}
          {activeTab === 'shadowing' && (
            <div class="shadowing-layout">
              {/* Sidebar Library */}
              <div class="glass-panel sentence-sidebar">
                <div style={{ fontWeight: 700, fontSize: '1rem', color: 'var(--text-main)', marginBottom: '8px' }}>
                  📚 Thư viện câu mẫu / Practice Library
                </div>

                <div class="sentence-list">
                  {SAMPLE_SENTENCES.map((sent, idx) => (
                    <div
                      key={sent.id}
                      class={`sentence-item ${idx === currentSentenceIdx ? 'active' : ''}`}
                      onClick={() => {
                        setCurrentSentenceIdx(idx);
                        setEvalResult(null);
                        setLiveTranscript('');
                      }}
                    >
                      <div class="sentence-item-text">{sent.text}</div>
                      <div class="sentence-item-meta">
                        <span>{VOICE_CONFIG[sent.lang]?.flag} {sent.difficulty}</span>
                        <span>{sent.lang}</span>
                      </div>
                    </div>
                  ))}
                </div>
              </div>

              {/* Practice Card */}
              <div class="glass-panel practice-card">
                <div class="target-sentence-box">
                  <div style={{ display: 'flex', justify: 'space-between', alignItems: 'center', marginBottom: '10px' }}>
                    <div class="target-label">
                      ✨ Câu mẫu / Target Sentence ({VOICE_CONFIG[currentSentence.lang]?.name})
                    </div>
                    <span class="badge badge-sage">{currentSentence.difficulty}</span>
                  </div>

                  <div class="target-text">{currentSentence.text}</div>
                  
                  {currentSentence.phonetic && (
                    <div style={{ marginTop: '8px', fontSize: '0.88rem', fontFamily: 'var(--font-mono)', color: 'var(--text-dim)' }}>
                      Phiên âm / IPA: {currentSentence.phonetic}
                    </div>
                  )}

                  <div style={{ marginTop: '10px', fontSize: '0.95rem', color: 'var(--text-muted)' }}>
                    🇻🇳 Dịch nghĩa: {currentSentence.translation}
                  </div>
                </div>

                {/* Controls Bar */}
                <div class="action-controls">
                  {/* 1. 「🔊 Phát âm thanh / Play Voice」 Button */}
                  <button
                    class={`btn btn-terracotta ${playingId === `sent-${currentSentence.id}` ? 'playing' : ''}`}
                    style={{ padding: '14px 24px' }}
                    disabled={loadingId === `sent-${currentSentence.id}`}
                    onClick={() => playEdgeTts(`sent-${currentSentence.id}`, currentSentence.text, currentSentence.lang)}
                  >
                    {loadingId === `sent-${currentSentence.id}` ? (
                      <span>⏳ Đang tổng hợp...</span>
                    ) : playingId === `sent-${currentSentence.id}` ? (
                      <>
                        <div class="equalizer-bar"><span></span><span></span><span></span></div>
                        <span>⏹ Dừng / Stop</span>
                      </>
                    ) : (
                      <>
                        <span>🔊 Phát âm thanh / Play Voice</span>
                      </>
                    )}
                  </button>

                  {/* 2. 「⬇️ Tải xuống MP3 / Download MP3」 Button */}
                  <button
                    class="btn btn-secondary"
                    style={{ padding: '14px 20px' }}
                    onClick={() => downloadMp3(`sent-${currentSentence.id}`, currentSentence.text, currentSentence.lang, `model_${currentSentence.lang}.mp3`)}
                  >
                    <span>⬇️ Tải xuống MP3 / Download MP3</span>
                  </button>

                  {/* Mic Recording Button */}
                  <button
                    class={`mic-button ${isRecording ? 'recording' : ''}`}
                    title="Nhấn để phát âm / Click to speak"
                    onClick={() => {
                      toggleRecording(currentSentence.lang, (finalText) => {
                        const res = evaluatePronunciation(currentSentence.text, finalText);
                        setEvalResult(res);
                      });
                    }}
                  >
                    {isRecording ? '🛑' : '🎙️'}
                  </button>

                  <button
                    class="btn btn-secondary"
                    style={{ padding: '14px 18px' }}
                    onClick={() => {
                      setCurrentSentenceIdx((prev) => (prev + 1) % SAMPLE_SENTENCES.length);
                      setEvalResult(null);
                      setLiveTranscript('');
                    }}
                  >
                    Tiếp theo / Next 🔄
                  </button>
                </div>

                {/* Live Transcript Output */}
                <div class="live-transcript-container">
                  <div style={{ fontSize: '0.8rem', fontWeight: 700, color: 'var(--text-dim)', textTransform: 'uppercase', marginBottom: '6px' }}>
                    🎙️ Giọng nói đã nhận diện / Recognized Voice (Web Speech STT)
                  </div>
                  <div class={liveTranscript ? 'transcript-final' : 'transcript-interim'}>
                    {liveTranscript || (isRecording ? 'Đang lắng nghe... Hãy nói rõ ràng vào micro' : 'Nhấn nút micro ở trên và đọc to câu mẫu')}
                  </div>
                </div>

                {/* Evaluation Card */}
                {evalResult && (
                  <div class="score-result-panel">
                    <div class="score-header">
                      <div>
                        <div style={{ fontSize: '0.85rem', color: 'var(--text-muted)', fontWeight: 600 }}>
                          Điểm chuẩn phát âm / Accuracy Score
                        </div>
                        <div style={{ fontSize: '1.3rem', fontWeight: 700, color: evalResult.gradeColor }}>
                          {evalResult.grade}
                        </div>
                      </div>
                      <div class="score-badge" style={{ color: evalResult.gradeColor }}>
                        {evalResult.score}%
                      </div>
                    </div>

                    <div style={{ fontSize: '0.85rem', color: 'var(--text-muted)', fontWeight: 600, marginTop: '8px' }}>
                      Chi tiết từ (Xanh: Chính xác, Đỏ: Sai/Thiếu, Cam: Thừa):
                    </div>

                    <div class="word-diff-container">
                      {evalResult.diff.map((item, i) => (
                        <span key={i} class={`diff-word diff-${item.type}`}>
                          {item.word} {item.said ? `(said: ${item.said})` : ''}
                        </span>
                      ))}
                    </div>
                  </div>
                )}
              </div>
            </div>
          )}

          {/* PDF LESSON SUMMARY MODAL (Báo cáo tóm tắt bài học) */}
          {showPdfModal && (
            <div class="pdf-modal-overlay">
              <div class="pdf-modal-card">
                <div style={{ padding: '16px 24px', borderBottom: '1px solid var(--border-warm)', display: 'flex', justifyContent: 'space-between', alignItems: 'center', background: '#fdfbf7' }}>
                  <div style={{ fontWeight: 700, fontSize: '1.1rem', color: 'var(--accent-terracotta-dark)' }}>
                    📄 Bài học tóm tắt / Lesson Summary Report (LingoBotWebApp)
                  </div>
                  <button class="btn btn-secondary" style={{ padding: '6px 12px' }} onClick={() => setShowPdfModal(false)}>✕</button>
                </div>

                {/* Printable PDF Content Section */}
                <div class="pdf-report-content" id="pdf-report-element">
                  <div class="pdf-report-header">
                    <div>
                      <div class="pdf-report-title">🤖 LingoBotWebApp</div>
                      <div style={{ fontSize: '0.9rem', color: '#5e5045', marginTop: '4px' }}>
                        Báo cáo tóm tắt kết quả bài học hội thoại / Conversation Lesson Summary Report
                      </div>
                    </div>
                    <div style={{ textAlign: 'right', fontSize: '0.85rem', color: '#8e7c6d' }}>
                      <div>Ngày / Date: {new Date().toLocaleDateString()}</div>
                      <div>Giờ / Time: {new Date().toLocaleTimeString()}</div>
                    </div>
                  </div>

                  {/* Summary Stats */}
                  <div class="pdf-section" style={{ background: '#fcf9f4', padding: '16px', borderRadius: '12px', border: '1px solid #e8ded0' }}>
                    <div class="pdf-section-title">📊 Tổng quan bài học / Lesson Summary</div>
                    <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr 1fr', gap: '12px', textAlign: 'center' }}>
                      <div>
                        <div style={{ fontSize: '0.8rem', color: '#8e7c6d' }}>Tin nhắn trao đổi</div>
                        <div style={{ fontSize: '1.5rem', fontWeight: 800, color: '#e07a5f' }}>{chatMessages.length}</div>
                      </div>
                      <div>
                        <div style={{ fontSize: '0.8rem', color: '#8e7c6d' }}>Điểm phát âm TB</div>
                        <div style={{ fontSize: '1.5rem', fontWeight: 800, color: '#2a9d8f' }}>
                          {evalResult ? `${evalResult.score}%` : '90%'}
                        </div>
                      </div>
                      <div>
                        <div style={{ fontSize: '0.8rem', color: '#8e7c6d' }}>Giọng đọc native</div>
                        <div style={{ fontSize: '1rem', fontWeight: 700, color: '#2d231d', marginTop: '6px' }}>Edge Voice</div>
                      </div>
                    </div>
                  </div>

                  {/* Conversation Transcripts */}
                  <div class="pdf-section">
                    <div class="pdf-section-title">💬 Lịch sử hội thoại bài học / Conversation History</div>
                    {chatMessages.map((msg, i) => (
                      <div key={i} class="pdf-chat-item">
                        <div style={{ fontWeight: 700, fontSize: '0.85rem', color: msg.sender === 'ai' ? '#e07a5f' : '#2a9d8f' }}>
                          {msg.sender === 'ai' ? '🤖 LingoBot AI' : '👤 Bạn / User'}:
                        </div>
                        <div style={{ marginTop: '4px' }}>{msg.text}</div>
                      </div>
                    ))}
                  </div>

                  {/* Recommendations */}
                  <div class="pdf-section" style={{ borderTop: '1px dashed #e8ded0', paddingTop: '16px' }}>
                    <div class="pdf-section-title">💡 Đánh giá & Lời khuyên / AI Feedback</div>
                    <div style={{ fontSize: '0.92rem', color: '#5e5045', lineHeight: 1.6 }}>
                      Chúc mừng bạn đã hoàn thành buổi luyện tập hội thoại tự học cùng <strong>LingoBotWebApp</strong>! 
                      Nhờ việc tích cực nói chuyện qua micro và lắng nghe giọng phản hồi chuẩn, phản xạ giao tiếp của bạn đang được nâng cao rõ rệt. Hãy tiếp tục phát huy nhé!
                    </div>
                  </div>
                </div>

                {/* PDF Action Buttons */}
                <div style={{ padding: '16px 24px', borderTop: '1px solid var(--border-warm)', background: '#fdfbf7', display: 'flex', justify: 'flex-end', gap: '12px' }}>
                  <button class="btn btn-secondary" onClick={() => window.print()}>🖨️ In / Print</button>
                  <button class="btn btn-terracotta" onClick={handleExportPdf}>📥 Tải xuống PDF / Export PDF</button>
                </div>
              </div>
            </div>
          )}
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
