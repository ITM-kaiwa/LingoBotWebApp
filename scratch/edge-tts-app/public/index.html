<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Microsoft Edge Neural TTS Studio (Aria, Nanami, HoaiMy)</title>
  <link rel="stylesheet" href="styles.css" />

  <!-- React & Babel Standalone CDN -->
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body>
  <div id="root"></div>

  <!-- React Application Component -->
  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    const PRESET_MESSAGES = [
      {
        id: 'msg-en',
        lang: 'en',
        voiceName: 'en-US-AriaNeural (US English)',
        flag: '🇺🇸',
        sender: 'AI Assistant (English)',
        text: 'Artificial intelligence powered by Microsoft Edge Neural TTS delivers lifelike, natural-sounding voices across multiple languages effortlessly.'
      },
      {
        id: 'msg-ja',
        lang: 'ja',
        voiceName: 'ja-JP-NanamiNeural (日本語)',
        flag: '🇯🇵',
        sender: 'AI Assistant (日本語)',
        text: 'Microsoft Edgeの無料ニューラル音声技術（Nanamiボイス）を活用することで、極めて自然な日本語音声をリアルタイムで合成し、MP3として再生・保存できます。'
      },
      {
        id: 'msg-vi',
        lang: 'vi',
        voiceName: 'vi-VN-HoaiMyNeural (Tiếng Việt)',
        flag: '🇻🇳',
        sender: 'AI Assistant (Tiếng Việt)',
        text: 'Công nghệ Microsoft Edge Neural TTS với giọng đọc Hoài Mỹ mang lại trải nghiệm âm thanh vô cùng tự nhiên, mượt mà và sống động.'
      }
    ];

    function App() {
      const [messages, setMessages] = useState(PRESET_MESSAGES);
      const [customText, setCustomText] = useState('');
      const [customLang, setCustomLang] = useState('ja');
      const [audioStates, setAudioStates] = useState({}); // { msgId: { loading, playing, audioUrl, error } }
      const activeAudioRef = useRef(null);
      const activeMsgIdRef = useRef(null);

      // Play or Pause Audio
      const handlePlayAudio = async (id, text, language) => {
        // If already playing this message, pause it
        if (audioStates[id]?.playing) {
          if (activeAudioRef.current) {
            activeAudioRef.current.pause();
          }
          setAudioStates(prev => ({ ...prev, [id]: { ...prev[id], playing: false } }));
          return;
        }

        // If another audio is playing, stop it first
        if (activeAudioRef.current) {
          activeAudioRef.current.pause();
          if (activeMsgIdRef.current) {
            setAudioStates(prev => ({ ...prev, [activeMsgIdRef.current]: { ...prev[activeMsgIdRef.current], playing: false } }));
          }
        }

        // Check if we already fetched the Blob ObjectURL for this text
        let audioUrl = audioStates[id]?.audioUrl;

        if (!audioUrl) {
          setAudioStates(prev => ({ ...prev, [id]: { loading: true, playing: false, error: null } }));
          try {
            const res = await fetch('/api/tts', {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({ text, language })
            });

            if (!res.ok) throw new Error(`Server returned HTTP ${res.status}`);

            const blob = await res.blob();
            audioUrl = URL.createObjectURL(blob);

            setAudioStates(prev => ({
              ...prev,
              [id]: { loading: false, playing: true, audioUrl }
            }));
          } catch (err) {
            console.error('TTS Fetch Error:', err);
            setAudioStates(prev => ({ ...prev, [id]: { loading: false, playing: false, error: err.message } }));
            alert(`TTS Error: ${err.message}`);
            return;
          }
        } else {
          setAudioStates(prev => ({ ...prev, [id]: { ...prev[id], playing: true } }));
        }

        // Create HTML5 Audio and play
        const audio = new Audio(audioUrl);
        activeAudioRef.current = audio;
        activeMsgIdRef.current = id;

        audio.onended = () => {
          setAudioStates(prev => ({ ...prev, [id]: { ...prev[id], playing: false } }));
          activeAudioRef.current = null;
          activeMsgIdRef.current = null;
        };

        audio.onerror = () => {
          setAudioStates(prev => ({ ...prev, [id]: { ...prev[id], playing: false, error: 'Audio playback failed' } }));
        };

        audio.play().catch(err => console.error('Play failed:', err));
      };

      // Download MP3 File
      const handleDownloadMp3 = async (id, text, language) => {
        let audioUrl = audioStates[id]?.audioUrl;

        if (!audioUrl) {
          setAudioStates(prev => ({ ...prev, [id]: { ...prev[id], loading: true } }));
          try {
            const res = await fetch('/api/tts', {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({ text, language })
            });

            if (!res.ok) throw new Error(`HTTP ${res.status}`);

            const blob = await res.blob();
            audioUrl = URL.createObjectURL(blob);
            setAudioStates(prev => ({ ...prev, [id]: { ...prev[id], loading: false, audioUrl } }));
          } catch (err) {
            setAudioStates(prev => ({ ...prev, [id]: { ...prev[id], loading: false } }));
            alert(`Download Error: ${err.message}`);
            return;
          }
        }

        // Trigger browser download via <a> element with download attribute
        const a = document.createElement('a');
        a.href = audioUrl;
        a.download = `edge_tts_${language}_${id}.mp3`;
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
      };

      // Handle custom text submission
      const handleAddCustomMessage = (e) => {
        e.preventDefault();
        if (!customText.trim()) return;

        const newMsg = {
          id: 'custom-' + Date.now(),
          lang: customLang,
          voiceName: customLang === 'en' ? 'en-US-AriaNeural' : customLang === 'ja' ? 'ja-JP-NanamiNeural' : 'vi-VN-HoaiMyNeural',
          flag: customLang === 'en' ? '🇺🇸' : customLang === 'ja' ? '🇯🇵' : '🇻🇳',
          sender: `User Input (${customLang.toUpperCase()})`,
          text: customText
        };

        setMessages(prev => [...prev, newMsg]);
        setCustomText('');
      };

      return (
        <div class="app-container">
          {/* Header */}
          <header class="glass-panel app-header">
            <div class="brand-section">
              <div class="brand-logo">🎙️</div>
              <div>
                <div class="brand-title">
                  Edge Neural TTS Studio
                  <span class="badge badge-edge">Microsoft Edge Engine</span>
                  <span class="badge badge-free">100% Free Neural Voice</span>
                </div>
                <div style={{ fontSize: '0.85rem', color: 'var(--text-muted)', marginTop: '4px' }}>
                  AIの返答テキストを高品質なネイティブ音声 (MP3) にリアルタイム変換・生成
                </div>
              </div>
            </div>
            <div>
              <span class="badge badge-free" style={{ padding: '8px 14px' }}>
                🟢 API Active (Port 5000)
              </span>
            </div>
          </header>

          {/* AI Response Feed Section */}
          <main class="glass-panel chat-feed">
            <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center' }}>
              <h2 style={{ fontSize: '1.2rem', color: 'white' }}>💬 AI Response Voice Feed</h2>
              <span style={{ fontSize: '0.85rem', color: 'var(--text-muted)' }}>
                Voices: Aria (US), Nanami (JA), HoaiMy (VI)
              </span>
            </div>

            {messages.map(msg => {
              const state = audioStates[msg.id] || {};
              return (
                <div key={msg.id} class="chat-card">
                  <div class="chat-header">
                    <div class="chat-role">
                      <span>{msg.flag}</span>
                      <span>{msg.sender}</span>
                      <span class="badge badge-edge" style={{ fontSize: '0.7rem' }}>{msg.voiceName}</span>
                    </div>
                  </div>

                  <div class="chat-text">{msg.text}</div>

                  {/* Required Action Buttons */}
                  <div class="message-actions">
                    {/* 1. 「🔊 音声を再生」 Button */}
                    <button
                      class={`btn btn-play ${state.playing ? 'playing' : ''}`}
                      disabled={state.loading}
                      onClick={() => handlePlayAudio(msg.id, msg.text, msg.lang)}
                    >
                      {state.loading ? (
                        <span>⏳ 合成中 (Generating MP3...)...</span>
                      ) : state.playing ? (
                        <>
                          <div class="equalizer-bar">
                            <span></span><span></span><span></span>
                          </div>
                          <span>⏹ 音声を停止</span>
                        </>
                      ) : (
                        <>
                          <span>🔊 音声を再生</span>
                        </>
                      )}
                    </button>

                    {/* 2. 「⬇️ MP3をダウンロード」 Button */}
                    <button
                      class="btn btn-download"
                      disabled={state.loading}
                      onClick={() => handleDownloadMp3(msg.id, msg.text, msg.lang)}
                    >
                      <span>⬇️ MP3をダウンロード</span>
                    </button>
                  </div>
                </div>
              );
            })}
          </main>

          {/* Custom Text Playground */}
          <section class="glass-panel" style={{ padding: '28px', display: 'flex', flexDirection: 'column', gap: '16px' }}>
            <h3 style={{ fontSize: '1.1rem', color: 'white' }}>✍️ テキスト即時試聴・MP3生成</h3>
            <form onSubmit={handleAddCustomMessage} style={{ display: 'flex', flexDirection: 'column', gap: '14px' }}>
              <div style={{ display: 'flex', gap: '12px' }}>
                <select
                  class="form-select"
                  style={{ width: '220px' }}
                  value={customLang}
                  onChange={(e) => setCustomLang(e.target.value)}
                >
                  <option value="ja">🇯🇵 日本語 (NanamiNeural)</option>
                  <option value="en">🇺🇸 英語 (AriaNeural)</option>
                  <option value="vi">🇻🇳 ベトナム語 (HoaiMyNeural)</option>
                </select>
                <input
                  type="text"
                  class="form-input"
                  placeholder="任意のテキストを入力して試聴カードを作成..."
                  value={customText}
                  onChange={(e) => setCustomText(e.target.value)}
                />
                <button type="submit" class="btn btn-play" style={{ whiteSpace: 'nowrap' }}>
                  ➕ 追加
                </button>
              </div>
            </form>
          </section>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
